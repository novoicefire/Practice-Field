<script>
'use strict';
const STORAGE_KEY='github-business-learning-spa-v4-strong-guidance';
const clone=v=>JSON.parse(JSON.stringify(v));
const seedFiles={
  'README.md':`# 校園永續市集企劃\n\n這是行銷管理課的期末專案，團隊要完成企劃書、預算、宣傳素材與活動網站。\n\n## 目標\n- 吸引 300 名校內學生參與\n- 招募 20 個攤位\n- 完成可展示的活動網站`,
  'market-research.md':`# 校園市集競品研究\n\n## 競品 A：草悟道假日市集\n- 客群：學生、親子與觀光客\n- 優點：交通方便、攤位選擇多\n- 攤位費：新台幣 3,000 元\n\n## 待補資料\n- 至少再研究兩個競品\n- 比較客群、宣傳方法與攤位費`,
  'budget.md':`# 初步預算\n\n- 場地設備：新台幣 12,000 元\n- 宣傳印刷：新台幣 4,000 元\n- 備用金：新台幣 3,000 元`,
  'social-plan.md':`# 社群宣傳規劃\n\n- 活動預告貼文\n- 攤商募集貼文\n- 倒數貼文`
};
function freshState(){return{
  page:'story',storyStep:0,selectedProblems:[],onboardingComplete:false,
  uiMode:'plain',learningMode:'guided',activeTab:'code',prSubtab:'conversation',
  branch:'main',selectedFile:null,editing:false,draftText:'',modal:null,
  files:{main:clone(seedFiles)},branches:{main:{name:'main',base:null,createdBy:'team'}},
  commits:[{id:'c001',branch:'main',message:'建立校園市集企劃專案',author:'小安',at:'5 天前',files:clone(seedFiles)}],
  issue:{id:12,title:'研究三個校園市集競品',body:'整理至少三個相似市集，供團隊決定活動定位與宣傳方法。',criteria:['至少包含三個競品','比較客群與宣傳方法','每個攤位費都要標示幣別'],assignee:null,label:'市場研究',due:'7 月 28 日',status:'todo',linkedBranch:null},
  pr:null,role:'Alex',projectStatus:'todo',events:[],done:[],demo:{active:false,index:0},orientation:{done:false,step:0,source:'guided'},challenge:false,
  sandbox:{active:null,step:0,feedback:'',data:{},completed:[]}
}}
const memoryStorage={};
function storageGet(k){try{return localStorage.getItem(k)}catch(e){return memoryStorage[k]||null}}
function storageSet(k,v){try{localStorage.setItem(k,v)}catch(e){memoryStorage[k]=String(v)}}
let state=load();
function load(){try{return Object.assign(freshState(),JSON.parse(storageGet(STORAGE_KEY)||'null')||{})}catch(e){return freshState()}}
function save(renderNow=true){storageSet(STORAGE_KEY,JSON.stringify(state));if(renderNow)render()}
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function nl(v=''){return esc(v).replace(/\n/g,'<br>')}
function commandHintHtml(v=''){return String(v).split('\n').map((line,i)=>`<div class="command-hint-line"><span class="command-hint-no">${i+1}</span><span class="command-hint-text">${esc(line)}</span></div>`).join('')}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),2400)}
function logEvent(text){state.events.unshift({text,at:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})})}
function done(key){if(!state.done.includes(key))state.done.push(key)}
function setPage(page){state.page=page;state.modal=null;save()}
function label(en,zh){if(state.uiMode==='plain')return `<span>${zh}</span><span class="en-label">${en}</span>`;return `<span class="en-label">${en}</span><span class="zh-label">${zh}</span>`}
function setUiMode(mode){state.uiMode=mode;save()}
function resetAll(){if(confirm('要清除故事進度與全部練習資料嗎？')){state=freshState();save();toast('已重新開始')}}
function header(){const tabs=[['story','故事起點'],['concept','Git 與 GitHub'],['practice','引導模擬'],['real','完全擬真'],['terms','名詞地圖'],['challenge','完整挑戰'],['progress','學習成果']];return `<header class="app-header"><div class="brand"><span class="brand-mark">G</span><span>協作練習場</span><span class="sim-badge">教學模擬</span></div><nav class="main-nav" aria-label="主要導覽">${tabs.map(([p,t])=>`<button class="${state.page===p?'active':''}" onclick="setPage('${p}')">${t}</button>`).join('')}</nav><div class="header-actions"><button class="icon-btn" title="重新開始" onclick="resetAll()">↻</button></div></header>`}
function storyPage(){const step=state.storyStep;return `<main class="page story-page"><div class="story-wrap">${step===0?storyIntro():step===1?storyWorkflow():step===2?storyProblems():storyBridge()}</div></main>`}
function storyIntro(){return `<section class="story-hero"><div class="story-copy"><h1>距離期末報告，只剩 5 天。</h1><p>你們四人要完成一份「校園永續市集」企劃書、活動網站與簡報。群組看起來很熱鬧，但現在沒有人能確定哪份才是正式版本。</p><div class="story-actions"><button class="btn primary large" onclick="state.storyStep=1;save()">進入 LINE 群組看看</button><button class="btn ghost large" onclick="setPage('concept')">我已經懂問題，先看概念</button></div><div class="story-note">不需要先懂 Git，也不需要安裝任何軟體。</div></div>${chatPhone()}</section>`}
function chatPhone(){return `<div class="phone" aria-label="LINE 群組情境模擬"><div class="phone-screen"><div class="chat-head"><div class="avatar green">市</div><div><div class="chat-title">行銷管理｜校園市集組</div><div class="chat-sub">4 位成員</div></div></div><div class="chat-body"><div class="message-row"><div class="mini-avatar">安</div><div class="bubble">教授說除了企劃書，還要做一個活動網站。大家照昨天分工做，完成後傳群組。<time>20:14</time></div></div><div class="message-row"><div class="mini-avatar" style="background:#4876a8">豪</div><div class="bubble">我把預算加進去了。<div class="file-attach"><span class="file-icon">📄</span><span class="file-name">校園市集企劃書_最新版.docx</span></div><time>22:08</time></div></div><div class="message-row"><div class="mini-avatar" style="background:#b2667d">芸</div><div class="bubble">我也改了活動日期和海報文案。<div class="file-attach"><span class="file-icon">📄</span><span class="file-name">校園市集企劃書_最新版_佳芸改.docx</span></div><time>22:31</time></div></div><div class="message-row me"><div class="bubble">我剛剛用 AI 補了競品分析，但我是從下午那份開始改的……<div class="file-attach"><span class="file-icon">📄</span><span class="file-name">校園市集企劃書_final_真的最終版2.docx</span></div><time>22:47</time></div></div><div class="message-row"><div class="mini-avatar">安</div><div class="bubble">所以到底要以哪一份為準？而且網站剛剛也被改壞了。<time>22:49</time></div></div></div></div></div>`}
function storyWorkflow(){const steps=[['💡','發想','群組丟很多想法'],['💬','討論','訊息快速往上推'],['👥','分工','一句「我來做」'],['📁','各自修改','複製或下載檔案'],['🧩','人工合併','組長整理所有版本']];return `<section class="story-panel"><h2>這其實是很常見的合作方式</h2><p>LINE、Google Docs 和雲端硬碟都很好用；問題通常不是工具不好，而是專案變複雜後，大家沒有共同的版本與審核流程。</p><div class="workflow-list">${steps.map(x=>`<div class="workflow-step"><span style="font-size:26px">${x[0]}</span><strong>${x[1]}</strong><small>${x[2]}</small></div>`).join('')}</div><div style="margin-top:24px;display:flex;justify-content:flex-end;gap:8px"><button class="btn" onclick="state.storyStep=0;save()">返回群組</button><button class="btn primary" onclick="state.storyStep=2;save()">看看哪裡出問題</button></div></section>`}
function storyProblems(){const problems=[['owner','不知道誰真正負責','「我以為是別人要做」'],['version','同時存在多個版本','「到底哪份才是最新版」'],['history','不知道改了什麼','只看到整份檔案被重新上傳'],['review','錯誤沒有人審核','內容直接進入最後版本'],['restore','AI 改壞後難以回復','不知道要退回哪個時間點'],['status','截止前才確認進度','組長必須逐一在群組追問']];return `<section class="story-panel"><h2>先不要背名詞，請找出合作問題</h2><p>點選你認為這個小組遇到的問題。這些問題之後都會對應到一個具體的協作方法。</p><div class="problem-grid">${problems.map(([k,t,d])=>`<button class="problem-card ${state.selectedProblems.includes(k)?'selected':''}" onclick="toggleProblem('${k}')"><b>${t}</b><span>${d}</span></button>`).join('')}</div><div class="warning">你不需要選到「標準答案」；這一步是要把原本模糊的不順，轉成可以處理的問題。</div><div style="margin-top:20px;display:flex;justify-content:space-between;gap:8px"><button class="btn" onclick="state.storyStep=1;save()">上一步</button><button class="btn primary" onclick="state.storyStep=3;state.onboardingComplete=true;done('diagnose');save()">整理成協作需求</button></div></section>`}
function toggleProblem(k){const i=state.selectedProblems.indexOf(k);i>=0?state.selectedProblems.splice(i,1):state.selectedProblems.push(k);save()}
function storyBridge(){return `<section class="story-panel"><h2>我們需要的不是更多群組訊息，而是一套共同流程</h2><p>先把問題翻成需求，之後 Git 和 GitHub 的每個名詞才會有意義。</p><div class="bridge-map"><div class="bridge-side"><div class="bridge-item">誰負責、何時完成？</div><div class="bridge-item">在哪裡安全修改？</div><div class="bridge-item">這次到底改了什麼？</div><div class="bridge-item">誰檢查過才算正式？</div></div><div class="bridge-arrow">→</div><div class="bridge-side"><div class="bridge-item"><b>任務要可指派、可驗收</b></div><div class="bridge-item"><b>正式版與個人修改要分開</b></div><div class="bridge-item"><b>每次版本要有原因與紀錄</b></div><div class="bridge-item"><b>修改先送審，再正式採用</b></div></div></div><p style="font-weight:700;color:var(--story-ink)">Git 負責版本紀錄；GitHub 把版本紀錄、分工、討論與審核放進同一個專案空間。</p><div style="display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap"><button class="btn" onclick="state.storyStep=2;save()">上一步</button><button class="btn primary large" onclick="setPage('concept')">現在再認識 Git 與 GitHub</button></div></section>`}
function conceptPage(){return `<main class="page concept-page"><div class="container"><div class="page-title"><div><h1>先理解行為，再記英文名詞</h1><p>Git 不是網站，GitHub 也不只是放程式碼的雲端硬碟。先從分組報告的版本與協作需求理解兩者差異。</p></div><div class="page-title-actions"><button class="btn primary" onclick="enterPractice('guided')">進入引導練習</button></div></div><div class="concept-grid"><article class="concept-card"><h2>Git：不會忘記的版本紀錄員</h2><p>每完成一段有意義的工作，就留下「誰、何時、做了什麼、為什麼」的紀錄；必要時可以比較或回到先前版本。</p><div class="version-timeline"><div class="version-node"><strong>建立企劃書骨架</strong><small>小安 · 星期一 20:10</small></div><div class="version-node"><strong>新增三家競品分析</strong><small>Alex · 星期二 18:42</small></div><div class="version-node"><strong>修正攤位費幣別</strong><small>Alex · 星期二 21:05</small></div></div><div class="chip green">Commit＝一次有說明的版本存檔</div></article><article class="concept-card"><h2>GitHub：團隊共同使用版本紀錄的空間</h2><p>除了保存 Git 的版本歷史，GitHub 還讓團隊建立任務、平行修改、提出修改申請、逐行審核及追蹤專案進度。</p><div class="term-flow"><span class="node">Issue<br><small>任務</small></span><span class="arr">→</span><span class="node">Branch<br><small>個人工作版</small></span><span class="arr">→</span><span class="node">Commit<br><small>版本紀錄</small></span><span class="arr">→</span><span class="node">PR<br><small>送審</small></span><span class="arr">→</span><span class="node">Merge<br><small>正式採用</small></span></div></article><article class="concept-card full"><h2>為什麼不只用 LINE、Google Docs 或 Google Drive？</h2><table class="tool-table"><thead><tr><th>工具</th><th>最擅長的事</th><th>專案變複雜後的限制</th></tr></thead><tbody><tr><td>LINE</td><td>快速討論、通知</td><td>任務、決策與檔案容易被訊息淹沒</td></tr><tr><td>Google Docs</td><td>多人同時編輯一份文件</td><td>不適合管理網站、圖片、資料與多個檔案組成的完整產品</td></tr><tr><td>Google Drive</td><td>儲存、分享檔案</td><td>很容易產生複製檔、最終版與人工整併</td></tr><tr><td>Git</td><td>精確記錄檔案版本差異</td><td>本身不負責團隊任務、審核與網頁協作介面</td></tr><tr><td>GitHub</td><td>把版本、任務、討論、審核與正式版放在一起</td><td>需要先理解一套新的協作流程</td></tr></tbody></table></article><article class="concept-card full"><h2>選擇學習方式</h2><p>同一個情境可以先看系統逐步示範，再跟著提示操作，最後移除提示自行完成。</p><div class="mode-grid"><div class="mode-card"><h3>看一次</h3><p>每一步都會停下來說明原因，必須由你按「下一步」才會繼續。</p><button class="btn primary" onclick="startDemo()">播放逐步示範</button></div><div class="mode-card"><h3>跟著做</h3><p>系統只提示目前目標、成功條件與下一個合理行動，不會直接替你完成。</p><button class="btn primary" onclick="enterPractice('guided')">開始引導練習</button></div><div class="mode-card"><h3>自己做</h3><p>不顯示逐步答案，只留下任務與驗收條件，完成後依協作紀錄評分。</p><button class="btn" onclick="setPage('challenge')">查看完整挑戰</button></div><div class="mode-card"><h3>完全擬真</h3><p>從空資料夾開始操作終端機與 GitHub 網頁，包含 Git 指令、push、Project、Issue、PR、Review 與同步。</p><button class="btn primary" onclick="setPage('real')">從零建立專案</button></div></div></article></div></div></main>`}
function enterPractice(mode='guided'){
  state.page='practice';state.learningMode=mode;state.challenge=mode==='challenge';state.activeTab='code';
  if(mode==='guided')state.orientation={done:false,step:0,source:'guided'};
  save()
}
function practicePage(){
  if(!state.challenge&&state.orientation&&!state.orientation.done)return beginnerOrientation();
  return `<main class="page practice-page mode-${state.uiMode}">${repoHeader()}${!state.challenge&&!state.demo.active?studentTaskBanner():''}<div class="practice-shell">${coachPanel()}<section class="sim-main">${practiceContent()}</section>${inspectorPanel()}</div>${state.demo.active?'<div class="demo-shield"></div>'+demoOverlay():''}</main>`
}

function orientationSteps(){return[
 {title:'先停一下：這不是考試，也不需要懂程式',body:'接下來看到的是「模擬 GitHub」。現在不要找按鈕，也不要擔心英文；我們會先把整個畫面拆成幾塊，再一次只做一個動作。',visual:`<div class="no-tech-notice"><div style="font-size:32px">🧭</div><div><b>本教材的規則</b><span>畫面只會要求你做一件事；正確位置會出現綠框與「現在只要點這裡」。其他按鈕會暫時鎖住。</span></div></div>`},
 {title:'Repository：先把它想成「整組專案資料夾」',body:'畫面最上方會顯示專案名稱。Repository 裡面不只放檔案，還會把任務、修改申請與進度看板放在同一處。',visual:`<div class="fake-repo-map"><div class="fake-repo-title">📁 campus-market / <b>semester-project</b><br><small style="color:var(--muted);font-weight:400">這整個區域就是 Repository（專案共同工作區）</small></div><div style="padding:24px;text-align:center;color:var(--muted)">企劃書、預算、網站檔案、任務、審核紀錄，都屬於同一個專案。</div></div>`},
 {title:'先認位置：Issue 與 Project 都在上方分頁',body:'Issue 不是藏在檔案裡；Project 也不是另一個網站。它們都在 Repository 名稱下方的分頁列。',visual:`<div class="tab-location-grid"><div class="tab-location"><span class="position">1</span><h3>Code</h3><p>看檔案與修改內容</p></div><div class="tab-location emphasis"><span class="position">2</span><h3>Issues</h3><p>任務卡在這裡；第一步會先點它</p></div><div class="tab-location"><span class="position">3</span><h3>Pull requests</h3><p>修改完成後送審</p></div><div class="tab-location emphasis"><span class="position">4</span><h3>Projects</h3><p>專案進度看板在這裡</p></div></div><div class="location-callout"><div><b>Issue 在哪裡？</b><small>上方第 2 個分頁「Issues／任務」</small></div><div><b>Project 在哪裡？</b><small>上方第 4 個分頁「Projects／專案看板」</small></div></div>`},
 {title:'操作畫面只有三個區域',body:'左邊告訴你現在的任務；中間才是實際操作區；右邊只負責解釋目前名詞。迷路時先看左邊，不要掃描整個畫面。',visual:`<div class="fake-workarea"><div class="fake-zone"><span class="zone-number">1</span><strong>左側：學習教練</strong><p>告訴你現在為什麼做、要完成什麼。</p></div><div class="fake-zone center"><span class="zone-number">2</span><strong>中央：唯一操作區</strong><p>綠框會圈出目前唯一要按的位置。</p></div><div class="fake-zone"><span class="zone-number">3</span><strong>右側：白話解釋</strong><p>解釋 Issue、Branch、Commit 等名詞。</p></div></div>`},
 {title:'你會從 Issue 開始，不會直接碰檔案',body:'第一個動作是到 Issues 找到任務卡。之後教材才會依序帶你建立工作版本、修改、存檔、送審與正式採用。',visual:`<div class="workflow-preview"><div class="wp-step"><b>1. Issue</b>看清任務</div><div class="wp-step"><b>2. Branch</b>建立工作版</div><div class="wp-step"><b>3. Edit</b>修改內容</div><div class="wp-step"><b>4. Commit</b>留下紀錄</div><div class="wp-step"><b>5. PR</b>送隊友審核</div><div class="wp-step"><b>6. Merge</b>正式採用</div></div><div class="no-tech-notice"><div style="font-size:30px">👉</div><div><b>進入後先找綠框</b><span>不用自己猜下一步；其他控制項會變淡並無法點擊。</span></div></div>`}
]}
function beginnerOrientation(){const steps=orientationSteps(),i=Math.min(state.orientation.step,steps.length-1),x=steps[i];return `<main class="beginner-orientation"><div class="orientation-shell"><div class="orientation-progress">${steps.map((_,n)=>`<i class="${n<i?'done':n===i?'active':''}"></i>`).join('')}</div><section class="orientation-card"><div class="orientation-copy"><div class="step-label">進入模擬前的畫面導覽 ${i+1} / ${steps.length}</div><h1>${x.title}</h1><p>${x.body}</p></div><div class="orientation-visual">${x.visual}</div><div class="orientation-actions"><button class="btn" ${i===0?'disabled':''} onclick="prevOrientation()">上一步</button><button class="btn primary large" onclick="nextOrientation()">${i===steps.length-1?(state.orientation.source==='demo'?'開始逐步示範':'我知道位置了，開始練習'):'下一個畫面'}</button></div></section></div></main>`}
function prevOrientation(){state.orientation.step=Math.max(0,state.orientation.step-1);save()}
function nextOrientation(){const n=orientationSteps().length;if(state.orientation.step<n-1){state.orientation.step++;save();return}state.orientation.done=true;state.activeTab='code';state.selectedFile=null;save();setTimeout(()=>window.scrollTo(0,0),0)}
function beginnerGuide(){
 if(state.modal){
   if(state.modal.type==='commit')return{n:6,title:'確認這次版本紀錄',text:'訊息已先放入範例。閱讀後，點綠框的「Commit changes」。',target:'confirm-commit'};
   if(state.modal.type==='pr')return{n:8,title:'確認修改申請內容',text:'標題與說明已用範例填好。閱讀後，點綠框建立 Pull Request。',target:'create-pr-confirm'};
   if(state.modal.type==='review')return{n:10,title:'送出具體審核意見',text:'這則留言指出哪裡錯、要怎麼修。點綠框的「Submit review」。',target:'submit-review'};
 }
 if(!state.issue.assignee){
   if(state.activeTab!=='issues')return{n:1,title:'先找到任務區',text:'看畫面上方分頁列，點第 2 個「Issues／任務」。',target:'tab-issues'};
   if(state.selectedFile!=='issue-12')return{n:2,title:'打開唯一的任務卡',text:'中央只有一張任務卡。點任務名稱「研究三個校園市集競品」。',target:'issue-card-12'};
   return{n:3,title:'讓大家知道誰負責',text:'在右側 Assignees 區塊，點「Assign yourself」。',target:'assign-btn'};
 }
 if(!state.issue.linkedBranch){
   if(state.activeTab!=='issues')return{n:4,title:'回到 Issue 找工作版本按鈕',text:'點上方「Issues／任務」，再回到剛才那張任務卡。',target:'tab-issues'};
   if(state.selectedFile!=='issue-12')return{n:4,title:'重新打開任務卡',text:'點「研究三個校園市集競品」。',target:'issue-card-12'};
   return{n:4,title:'建立不影響正式版的工作版本',text:'在右側 Development 區塊，點「Create a branch」。',target:'issue-branch-btn'};
 }
 if(!state.done.includes('commit')){
   if(state.activeTab!=='code')return{n:5,title:'到檔案區開始工作',text:'點上方第 1 個「Code／檔案」。',target:'tab-code'};
   if(state.selectedFile!=='market-research.md')return{n:5,title:'打開競品研究檔案',text:'點中央檔案列表中的 market-research.md。',target:'file-market-research'};
   if(!state.editing)return{n:5,title:'進入編輯模式',text:'點右上方「編輯這個檔案」。',target:'edit-file-btn'};
   if(!guidedDraftReady())return{n:5,title:'插入本關指定練習內容',text:'不用自己打長篇文字。點「套用教材內容」，觀察新增了哪些競品。',target:'fill-template-btn'};
   return{n:6,title:'建立 Commit 版本紀錄',text:'內容已修改。點下方綠框「建立版本紀錄…」。',target:'commit-button'};
 }
 if(!state.pr){
   if(state.activeTab!=='pulls')return{n:7,title:'找到修改送審區',text:'點上方第 3 個「Pull requests／修改申請」。',target:'tab-pulls'};
   return{n:7,title:'建立新的修改申請',text:'中央目前沒有 PR。點「New pull request」。',target:'new-pr-btn'};
 }
 if(state.pr.reviewStatus==='none'){
   if(state.role!=='志豪')return{n:9,title:'切換成隊友來審核',text:'你現在仍是修改者 Alex。點左側教練的綠色按鈕，切換成志豪。',target:'coach-primary-action'};
   if(state.activeTab!=='pulls')return{n:9,title:'回到 Pull Request',text:'點上方「Pull requests／修改申請」。',target:'tab-pulls'};
   if(state.prSubtab!=='files')return{n:9,title:'先看實際修改差異',text:'點 PR 內的「Files changed」分頁。',target:'files-changed-tab'};
   return{n:9,title:'在真正有問題的那一行留言',text:'找到「攤位費：5000」，點該行左側的綠框＋號。',target:'review-line-btn'};
 }
 if(state.pr.reviewStatus==='changes_requested'&&!isFixed()){
   if(!(state.editing&&state.selectedFile==='market-research.md'))return{n:11,title:'依 Review 回去修正',text:'點左側教練的綠色按鈕，系統會切回 Alex 並定位到問題。',target:'coach-primary-action'};
   return{n:11,title:'把修正另存成新的 Commit',text:'內容已補上幣別與單位。點「建立版本紀錄…」。',target:'commit-button'};

function pullsCore(){if(!state.pr)return `<div class="guided-help-card"><b>你已進入 Pull requests（修改申請）</b><p>這裡不是另一份檔案；PR 是把 Branch 的修改送給隊友檢查。現在尚未建立，所以畫面是空的。</p></div><div class="empty box"><h3>目前沒有 Pull Request</h3><p>在自己的 Branch 完成至少一筆 Commit 後，才能把修改送給隊友審核。</p><button id="new-pr-btn" class="btn success" onclick="openPRForm()">New pull request</button></div>`;return prDetail()}
function openPRForm(){if(!state.issue.linkedBranch||!state.done.includes('commit')){toast('請先從 Issue 建立 Branch 並完成一筆 Commit');return}state.modal={type:'pr',title:state.learningMode==='guided'?'新增兩個校園市集競品分析':'',body:state.learningMode==='guided'?'## 修改內容\n- 新增逢甲與審計新村案例\n- 比較客群、宣傳方法與攤位費\n\n## 請協助檢查\n- 金額與資料完整性':''};state.activeTab='pulls';save()}
function prModal(){return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h2>Open a pull request</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body"><div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><span class="chip">base: main</span><span>←</span><span class="chip green">compare: ${esc(state.issue.linkedBranch)}</span></div><div class="form-grid"><div class="form-row"><label>Title <span class="zh-label">讓審核者一眼理解修改</span></label><input class="input" oninput="state.modal.title=this.value" value="${esc(state.modal.title||'')}" placeholder="新增兩個校園市集競品分析"></div><div class="form-row"><label>Description <span class="zh-label">改了什麼、為什麼、要檢查什麼</span></label><textarea class="textarea" oninput="state.modal.body=this.value" placeholder="## 修改內容\n- 新增兩個競品\n\n## 請協助檢查\n- 攤位費與宣傳方法">${esc(state.modal.body||'')}</textarea></div></div></div><div class="modal-foot"><button class="btn" onclick="state.modal=null;save()">取消</button><button id="create-pr-confirm" class="btn success" onclick="createPR()">Create pull request</button></div></div></div>`}
function createPR(){if(!(state.modal.title||'').trim()||!(state.modal.body||'').trim()){toast('PR 標題與說明都需要填寫');return}state.pr={id:24,title:state.modal.title.trim(),body:state.modal.body.trim(),source:state.issue.linkedBranch,target:'main',status:'open',reviewStatus:'none',comments:[],reviewer:null};state.modal=null;state.projectStatus='in_review';done('pr');logEvent('建立 Pull Request #24：'+state.pr.title);save();toast('PR 已送出，修改尚未進入 main')}
function prDetail(){const p=state.pr;return `<div class="pr-header"><h2>${esc(p.title)} <span style="color:var(--muted);font-weight:400">#${p.id}</span></h2><p><span class="state-label ${p.status==='merged'?'merged':''}">${p.status==='merged'?'Merged':'Open'}</span> ${esc(p.source)} wants to merge into ${esc(p.target)}</p></div><div class="pr-subtabs"><button id="pr-conversation-tab" class="${state.prSubtab==='conversation'?'active':''}" onclick="state.prSubtab='conversation';save()">Conversation</button><button class="${state.prSubtab==='commits'?'active':''}" onclick="state.prSubtab='commits';save()">Commits <span class="count">${branchCommits().length}</span></button><button id="files-changed-tab" class="${state.prSubtab==='files'?'active':''}" onclick="state.prSubtab='files';save()">Files changed</button></div>${state.prSubtab==='files'?filesChangedView():state.prSubtab==='commits'?commitsView():conversationView()}`}
function branchCommits(){return state.commits.filter(c=>c.branch===state.issue.linkedBranch)}
function commitsView(){return `<div class="box"><div class="box-head"><b>${branchCommits().length} commits</b></div>${branchCommits().map(c=>`<div class="issue-list-item"><div>●</div><div><h3>${esc(c.message)}</h3><p>${esc(c.author)} committed ${esc(c.at)}</p></div><span class="chip">${esc(c.id)}</span></div>`).join('')}</div>`}
function conversationView(){const p=state.pr;return `<div class="pr-layout"><div><div class="discussion"><div class="avatar blue">A</div><div class="discussion-card"><div class="discussion-head"><b>Alex</b> opened this pull request</div><div class="discussion-body">${nl(p.body)}</div></div></div>${p.comments.map(c=>`<div class="discussion"><div class="avatar ${c.author==='志豪'?'blue':'green'}">${c.author==='志豪'?'豪':'A'}</div><div class="discussion-card"><div class="discussion-head"><b>${esc(c.author)}</b> ${esc(c.type)}</div><div class="discussion-body">${nl(c.body)}</div></div></div>`).join('')}${mergePanel()}</div><aside><div class="side-meta"><b>Reviewers</b>${p.reviewer?`<span class="chip">${esc(p.reviewer)}</span>`:'尚未指派'}</div><div class="side-meta"><b>Linked issue</b><button class="file-link" onclick="setTab('issues')">#12 ${esc(state.issue.title)}</button></div><div class="side-meta"><b>Status</b><span class="chip ${p.reviewStatus==='approved'?'green':p.reviewStatus==='changes_requested'?'orange':''}">${reviewLabel()}</span></div></aside></div>`}
function reviewLabel(){return state.pr.reviewStatus==='approved'?'Approved':state.pr.reviewStatus==='changes_requested'?'Changes requested':'Review required'}
function computeDiff(){const oldText=state.files.main['market-research.md'].split('\n');const newText=state.files[state.issue.linkedBranch]['market-research.md'].split('\n');let out=[];const max=Math.max(oldText.length,newText.length);for(let i=0;i<max;i++){const a=oldText[i],b=newText[i];if(a===b&&a!==undefined)out.push({type:'ctx',old:i+1,new:i+1,text:a});else{if(a!==undefined)out.push({type:'del',old:i+1,new:'',text:a});if(b!==undefined)out.push({type:'add',old:'',new:i+1,text:b})}}return out}
function filesChangedView(){const diff=computeDiff();return `<div class="diff-file"><div class="diff-head">market-research.md</div>${diff.map((d,i)=>`<div class="diff-line ${d.type}"><span class="num">${d.old}</span><span class="num">${d.new}</span><button id="${/攤位費：\s*5000/.test(d.text)?'review-line-btn':''}" class="add-btn" title="在這一行留言" onclick="openLineReview(${i})">+</button><span class="code">${d.type==='add'?'+':d.type==='del'?'-':' '} ${esc(d.text)}</span></div>`).join('')}</div>${state.pr.reviewStatus==='none'?`<div class="merge-box bad"><h3>Review required</h3><p>至少需要一位隊友確認修改。請特別檢查金額、日期與完成條件。</p><button class="btn" onclick="openGeneralReview()">Review changes</button></div>`:''}${state.pr.comments.filter(c=>c.line!==undefined).map(c=>`<div class="review-comment"><b>${esc(c.author)} 在第 ${c.line} 行：</b> ${esc(c.body)}</div>`).join('')}${state.pr.reviewStatus==='changes_requested'&&!isFixed()?`<div class="merge-box bad"><h3>Changes requested</h3><p>請先處理逐行回饋，再請隊友重新審核。</p></div>`:''}${isFixed()&&state.pr.reviewStatus==='changes_requested'?`<div class="merge-box good"><h3>新的 Commit 已處理回饋</h3><p>現在可以切換審核者並 Approve。</p><button id="approve-btn" class="btn success" onclick="approvePR()">Switch to 志豪 & Approve</button></div>`:''}`}
function startReview(){state.role='志豪';state.pr.reviewer='志豪';state.prSubtab='files';state.activeTab='pulls';save();toast('現在以隊友身分審核，不是直接修改 Alex 的內容')}
function openLineReview(index){state.role='志豪';state.pr.reviewer='志豪';const d=computeDiff()[index];state.modal={type:'review',line:d.new||d.old,lineText:d.text,kind:'line',body:d.text.includes('攤位費：5000')?'請補上幣別與單位，例如「新台幣 5,000 元」。':''};save()}
function openGeneralReview(){state.role='志豪';state.pr.reviewer='志豪';state.modal={type:'review',kind:'general',body:''};save()}
function reviewModal(){return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h2>Review changes</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body">${state.modal.kind==='line'?`<div class="warning" style="margin-bottom:13px"><b>針對這一行：</b><br>${esc(state.modal.lineText)}</div>`:''}<div class="form-row"><label>Review comment</label><textarea class="textarea" oninput="state.modal.body=this.value">${esc(state.modal.body||'')}</textarea></div><div style="margin-top:14px;display:grid;gap:8px"><label><input type="radio" name="review-kind" value="comment"> Comment：只留言，不表達是否可合併</label><label><input type="radio" name="review-kind" value="approve"> Approve：內容可正式採用</label><label><input type="radio" name="review-kind" value="changes_requested" checked> Request changes：必須修正後才能合併</label></div></div><div class="modal-foot"><button class="btn" onclick="state.modal=null;save()">取消</button><button id="submit-review" class="btn success" onclick="submitReview()">Submit review</button></div></div></div>`}
function submitReview(){const body=(state.modal.body||'').trim();if(!body){toast('請寫出具體、可執行的 Review 意見');return}const picked=document.querySelector('input[name="review-kind"]:checked');const status=picked?picked.value:'changes_requested';state.pr.comments.push({author:state.role,type:status==='approve'?'approved':status==='changes_requested'?'requested changes':'commented',body,line:state.modal.kind==='line'?state.modal.line:undefined});if(status!=='comment')state.pr.reviewStatus=status;state.modal=null;if(status==='changes_requested'){done('review');logEvent('志豪在 PR #24 Request changes：'+body)}save();toast(status==='changes_requested'?'已要求修正，PR 暫時不能合併':'Review 已送出')}
function fixFromReview(){state.role='Alex';state.branch=state.issue.linkedBranch;state.activeTab='code';state.selectedFile='market-research.md';state.editing=true;state.draftText=state.files[state.branch]['market-research.md'].replace(/攤位費：\s*5000/g,'攤位費：新台幣 5,000 元');save();toast('已定位到需要修正的內容，請確認後建立新 Commit')}
function isFixed(){const t=(state.files[state.issue.linkedBranch]||{})['market-research.md']||'';return !/攤位費：\s*5000/.test(t)&&/新台幣 5,000 元/.test(t)}
function approvePR(){if(!isFixed()){toast('尚未處理攤位費的幣別與單位');return}state.role='志豪';state.pr.reviewStatus='approved';state.pr.comments.push({author:'志豪',type:'approved',body:'已確認攤位費幣別與單位，競品數量及比較內容符合 Issue 完成條件。'});done('review');logEvent('志豪 Approve PR #24');state.prSubtab='conversation';state.activeTab='pulls';save();toast('Review 通過，現在才可以 Merge')}
function mergePanel(){const p=state.pr;if(p.status==='merged')return `<div class="merge-box good"><h3>Pull request successfully merged and closed</h3><p>main 已更新，Issue #12 與 Project 看板也同步完成。</p></div>`;if(p.reviewStatus!=='approved')return `<div class="merge-box bad"><h3>Merge blocked</h3><p>${p.reviewStatus==='changes_requested'?'尚有必須處理的 Review 意見。':'需要至少一位隊友 Approve。'}</p><button class="btn success" disabled>Merge pull request</button></div>`;return `<div class="merge-box good"><h3>All checks have passed</h3><p>修改已通過審核，可以正式放進 main。</p><button id="merge-btn" class="btn success" onclick="mergePR()">Merge pull request</button></div>`}
function mergePR(){if(!state.pr||state.pr.reviewStatus!=='approved'){toast('PR 尚未通過審核');return}state.files.main=clone(state.files[state.pr.source]);state.commits.push({id:'m'+String(state.commits.length+1).padStart(3,'0'),branch:'main',message:'Merge pull request #24 from '+state.pr.source,author:'小安',at:'剛剛',files:clone(state.files.main)});state.pr.status='merged';state.issue.status='done';state.projectStatus='done';state.branch='main';done('merge');logEvent('PR #24 Merge 至 main，Issue #12 完成');save();toast('正式版本已更新，任務與看板同步完成')}
function projectView(){const complete=state.projectStatus==='done'?`<div class="beginner-complete"><h3>✓ Project 看板已同步完成</h3><p>PR Merge 後，Issue #12 自動關閉，任務卡也移到 Done。Project 的用途就是讓全組看見進度。</p></div>`:'';const cols=[['todo','Todo','待處理'],['in_progress','In progress','進行中'],['in_review','In review','待審核'],['done','Done','完成']];return `<div class="guided-help-card"><b>Project 在哪裡？你現在就在上方第 4 個 Projects 分頁</b><p>這裡不是建立檔案，而是把 Issue／PR 顯示成 Todo、In progress、In review、Done 的進度看板。</p></div><div class="box"><div class="box-head"><div><b>校園市集企劃</b><span style="color:var(--muted);margin-left:8px">Project board</span></div><span class="chip">1 item</span></div><div class="box-body">${complete}<div class="project-board" style="margin-top:${complete?'14px':'0'}">${cols.map(([id,en,zh])=>`<div class="project-col"><h3><span>${en}<span class="zh-label">${zh}</span></span><span>${state.projectStatus===id?1:0}</span></h3>${state.projectStatus===id?projectCard():''}</div>`).join('')}</div></div></div>`}
function projectCard(){return `<div class="project-card"><b>#12 ${esc(state.issue.title)}</b><p>${state.issue.assignee?'負責人：'+state.issue.assignee:'尚未指派'} · ${esc(state.issue.due)}</p><span class="chip purple">${esc(state.issue.label)}</span><div class="move-row" style="margin-top:9px"><button class="btn small" onclick="moveProject(-1)">←</button><button class="btn small" onclick="moveProject(1)">→</button></div></div>`}
function moveProject(dir){const arr=['todo','in_progress','in_review','done'];let i=arr.indexOf(state.projectStatus);i=Math.max(0,Math.min(arr.length-1,i+dir));state.projectStatus=arr[i];logEvent('手動更新 Project 狀態為 '+arr[i]);save()}
function graphView(){const branch=state.issue.linkedBranch;const rows=[];state.commits.forEach((c,i)=>{let track='●';if(c.branch!=='main')track='│  ●';if(c.id.startsWith('m'))track='●──╯';rows.push(`<div class="graph-row"><span class="graph-track">${track}</span><span class="graph-hash">${esc(c.id)}</span><span class="graph-msg">${esc(c.message)} ${c.branch==='main'?'<span class="graph-branch">(main)</span>':`<span class="graph-branch">(${esc(c.branch)})</span>`}</span></div>`) });return `<div class="git-graph"><div style="font-weight:800;color:#fff;margin-bottom:10px">Git 透視模式｜操作背後的版本結構</div>${rows.join('')}<div class="graph-note">Create branch 會從 main 分出安全工作線；每次 Commit 增加一個可追蹤節點；Pull Request 是提出合併申請；Merge 通過後，正式版才包含該 Branch 的內容。</div></div>`}

function termForContext(){const map={issues:['Issue','一張可以指派、追蹤與驗收的任務或問題卡。','不是在群組說「誰幫忙做一下」，而是把工作寫成有負責人與完成條件的工作單。'],pulls:['Pull Request','把 Branch 的修改送給團隊討論、檢查與決定是否採用。','像把企劃書修訂稿附上變更說明，正式請組員審稿。'],projects:['Project','把 Issue 與 PR 放進看板，讓整體進度透明。','像 Trello 或課堂分工表，但任務會直接連到實際修改。'],graph:['Git','負責記錄檔案版本、差異與分支關係的版本控制系統。','像永遠不會忘記每一版內容與修改原因的版本帳本。'],code:state.branch==='main'?['main','團隊已採用的正式版本。','像準備交給教授或公開展示的正式企劃，不應繞過審核直接修改。']:['Branch','從正式版分出的安全工作空間。','像先在自己的修訂稿工作，確認後才申請放回正式企劃。']};const a=map[state.activeTab]||map.code;return{name:a[0],explain:a[1],analogy:a[2]}}

function applyDemoFocus(){document.querySelectorAll('.demo-focus').forEach(x=>x.classList.remove('demo-focus'));if(!state.demo.active||!state.orientation||!state.orientation.done)return;document.querySelectorAll('.practice-shell button,.repo-context button,.practice-shell select,.practice-shell input,.practice-shell textarea').forEach(el=>{el.disabled=true});const step=demoSteps()[state.demo.index];if(step&&step.focus){const el=document.getElementById(step.focus);if(el){el.classList.add('demo-focus');el.disabled=true;el.scrollIntoView({block:'center',behavior:'smooth'})}}}
function termsPage(){const terms=[['Repository / Repo','一個完整專案的共同工作區。','共同企劃資料夾，但包含版本、任務與審核紀錄。'],['main','團隊目前採用的正式版本。','準備交件或公開展示的版本。'],['Branch','從正式版分出的安全工作線。','自己的修訂稿，不會立刻改到正式企劃。'],['Commit','一次有說明、可追蹤的版本存檔。','在版本帳本蓋章，寫清楚這次完成什麼。'],['Issue','可以指派與驗收的任務或問題卡。','不是「幫忙做」，而是有負責人與完成條件的工作單。'],['Pull Request','請團隊審核並採用 Branch 修改的申請。','附上變更說明的正式審稿請求。'],['Diff','兩個版本之間實際增加、刪除或修改的內容。','老師開啟修訂模式後看到的逐行差異。'],['Review','針對修改提出意見、核准或要求修正。','逐段審稿並留下可執行回饋。'],['Merge','把通過審核的修改放進正式版本。','將核准修訂正式納入主企劃。'],['Project','用看板追蹤 Issue 與 PR 狀態。','任務進度表，但直接連到實際成果與修改。'],['Conflict','兩個版本改到同一位置，系統無法自動判斷。','兩位組員同時重寫同一段，需要共同決定保留內容。'],['Revert','用新紀錄撤銷先前修改。','不是刪除歷史，而是清楚記下「退回這次改動」。']];return `<main class="page terms-page"><div class="container"><div class="page-title"><div><h1>名詞地圖</h1><p>每個名詞都包含一句白話用途與一個商管分組類比。</p></div><div class="page-title-actions"><button class="btn primary" onclick="enterPractice('guided')">回到模擬練習</button></div></div><div class="terms-grid">${terms.map(t=>`<article class="glossary"><h3>${t[0]}</h3><p>${t[1]}</p><p class="analogy"><b>類比：</b>${t[2]}</p></article>`).join('')}</div></div></main>`}
function challengePage(){const sb=sandboxState();const cards=[
  ['main','直接修改 main','親手把未確認內容 Commit 到正式版，觀察隊友與公開版本立刻受到什麼影響。',['直接改正式版','Revert 與修復 Branch']],
  ['commit','Commit 只寫 update','建立難以辨識的版本歷史，再使用 Diff 找回真正內容並修正 Commit 訊息。',['模糊歷史','git show 與 amend']],
  ['review','沒有 Review 就 Merge','跳過 Files changed，把錯誤發布出去，再 Revert 並完成一輪真正的修復 PR。',['錯誤發布','Revert 與 Hotfix PR']],
  ['conflict','兩人修改同一行','讓兩個 Branch 同時修改活動日期，實際看到 Conflict marker 並選擇整合內容。',['Merge conflict','比較、整合、Resolve']]
];return `<main class="page challenge-page"><div class="container"><div class="challenge-hero"><div><h1>完整挑戰：校園市集最後救援</h1><p>距離截止只剩 45 分鐘。你的任務是從一張未指派的 Issue 開始，在不直接修改 main 的前提下，完成競品分析、送審、處理 Review，最後更新正式版與看板。</p><div class="warning">挑戰模式不顯示下一步提示；但所有按鈕、狀態與錯誤結果都和引導模式相同。</div><div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary large" onclick="startChallenge()">重設並開始挑戰</button><button class="btn" onclick="setPage('practice')">繼續目前進度</button></div></div><aside class="mission"><h3>成功條件</h3><ol><li>Issue 有明確負責人與完成條件</li><li>從 main 建立個人 Branch</li><li>新增至少兩個競品並 Commit</li><li>PR 說明修改內容與檢查重點</li><li>針對問題行留下具體 Review</li><li>修正後經 Approve 才 Merge</li><li>Issue 與 Project 進入完成</li></ol></aside></div><section style="margin-top:22px"><div class="page-title"><div><h1 style="font-size:26px">錯誤沙盒：真的做錯一次，再親手救回來</h1><p>每一關都有可操作介面、狀態變化、錯誤後果與復原任務；不會改動正式練習進度。</p></div><span class="chip green">已完成 ${sb.completed.length} / ${cards.length}</span></div><div class="sandbox-grid">${cards.map(([k,t,d,tags])=>`<article class="mode-card sandbox-card ${sb.completed.includes(k)?'completed':''}"><span class="sandbox-tag">${sb.completed.includes(k)?'✓ 已完成':'⚠ 可安全犯錯'}</span><h3>${t}</h3><p>${d}</p><ul>${tags.map(x=>`<li>${x}</li>`).join('')}</ul><button class="btn ${sb.completed.includes(k)?'success':'danger'}" onclick="startMistake('${k}')">${sb.completed.includes(k)?'重新玩一次':'進入互動模擬'}</button></article>`).join('')}</div></section></div></main>`}
function sandboxState(){if(!state.sandbox||typeof state.sandbox!=='object')state.sandbox={active:null,step:0,feedback:'',data:{},completed:[]};if(!Array.isArray(state.sandbox.completed))state.sandbox.completed=[];if(!state.sandbox.data)state.sandbox.data={};return state.sandbox}
const sandboxMeta={
 main:{title:'直接修改 main',steps:6,brief:'你現在扮演急著交作業的組員。請真的把未確認內容放進 main，再觀察整個團隊會發生什麼。',lesson:'main 是團隊正式版本。錯誤不是「按錯一個按鈕」，而是跳過隔離與審核，讓所有人立即承受後果。'},
 commit:{title:'Commit 只寫 update',steps:5,brief:'你會先建立一筆毫無資訊的 Commit，接著在一排 update 裡尋找需要的版本。',lesson:'Commit 訊息是版本歷史的索引。沒有清楚訊息，就只能逐筆打開 Diff 猜測。'},
 review:{title:'沒有 Review 就 Merge',steps:6,brief:'你會故意跳過 Files changed，讓錯誤進入正式網站，再完成 Revert 與 Hotfix PR。',lesson:'Merge 不是完成工作的按鈕，而是團隊正式採用修改的決策。'},
 conflict:{title:'兩人修改同一行',steps:5,brief:'Alex 與佳芸會同時修改活動日期。Git 無法替團隊決定內容，因此必須由人理解語意後整合。',lesson:'Conflict 不是 Git 壞掉，而是兩個合理版本互相矛盾，需要人做內容決策。'}

function startMistake(kind){state.modal={type:'mistake',kind};state.sandbox=sandboxState();state.sandbox.active=kind;state.sandbox.step=0;state.sandbox.feedback='';state.sandbox.data=kind==='main'?{text:'# 活動資訊\n\n活動日期：8 月 31 日\n攤位費：5000'}:kind==='commit'?{picked:null,message:'update'}:kind==='review'?{date:false,currency:false}:{};save()}
function closeMistake(){state.modal=null;const sb=sandboxState();sb.active=null;sb.step=0;sb.feedback='';sb.data={};save()}
function sandboxGo(step,feedback=''){const sb=sandboxState();sb.step=step;sb.feedback=feedback;save()}
function sandboxWrong(msg){sandboxState().feedback=msg;save()}
function sandboxComplete(kind){const sb=sandboxState();if(!sb.completed.includes(kind))sb.completed.push(kind);sb.step=sandboxMeta[kind].steps-1;sb.feedback='';save();toast('錯誤已成功復原，這一關完成')}

function mistakeModal(){const sb=sandboxState(),kind=state.modal.kind,meta=sandboxMeta[kind],step=Math.min(sb.step,meta.steps-1);return `<div class="modal-backdrop"><div class="modal sandbox-modal" role="dialog" aria-modal="true"><div class="modal-head"><h2>錯誤沙盒｜${meta.title}</h2><button class="close-btn" onclick="closeMistake()">×</button></div><div class="sandbox-top"><div><b>這不是文字說明：</b>請親手操作、看見後果，再完成復原。</div><div class="sandbox-progress"><span>${step+1} / ${meta.steps}</span><div class="sandbox-progress-track"><i style="width:${(step+1)/meta.steps*100}%"></i></div></div></div><div class="modal-body"><div class="sandbox-layout"><aside class="sandbox-brief"><h3>${meta.title}</h3><p>${meta.brief}</p><div class="lesson"><b>這關要理解</b>${meta.lesson}</div><button class="dark-btn" style="margin-top:14px;width:100%" onclick="startMistake('${kind}')">從本關重來</button><button class="dark-btn" style="margin-top:7px;width:100%" onclick="closeMistake()">離開沙盒</button></aside><section class="sandbox-stage">${sandboxScenario(kind,step)}${sb.feedback?`<div class="sandbox-feedback">${esc(sb.feedback)}</div>`:''}</section></div></div></div></div>`}
function sandboxScenario(kind,step){return kind==='main'?sandboxMain(step):kind==='commit'?sandboxCommit(step):kind==='review'?sandboxReview(step):sandboxConflict(step)}

function realLabPage(){const r=ensureRealLab(),step=realStep(),meta=realSteps[step];setTimeout(applyRealFocus,0);return `<main class="page real-page"><div class="real-topbar"><div class="real-title"><span class="octo">GH</span><span>完全擬真實戰｜本機 Git × GitHub Web</span></div><div class="real-progress"><span>${step} / 16</span><div class="real-progress-track"><i style="width:${step/16*100}%"></i></div><button class="dark-btn" onclick="resetRealLab()">重設此模式</button></div></div><div class="real-layout"><aside class="real-course"><h2>從零建立一個專案</h2><p>所有步驟都從空資料夾與空 GitHub 開始。</p><div class="real-step-list">${realSteps.map((x,i)=>`<button class="real-step-item ${i<step?'done':i===step?'now':''}" onclick="showRealStepInfo(${i})"><span class="real-step-no">${i<step?'✓':i+1}</span><span><b>${esc(x.short)}</b><small>${esc(x.title)}</small></span></button>`).join('')}</div></aside><section class="real-main">${step===16?realCompletion():`<div class="real-coach"><div><h2>第 ${step+1} 步：${esc(meta.title)}</h2><p>${esc(meta.why)}</p>${r.coach?`<div class="command-hint" aria-label="教練指令">${commandHintHtml(meta.command)}</div>`:''}</div><label class="coach-switch"><input type="checkbox" ${r.coach?'checked':''} onchange="ensureRealLab().coach=this.checked;save()"> 顯示教練指令</label></div>`}<div class="dual-workspace"><div class="work-stack">${terminalPanel()}${localWorkspacePanel()}</div>${githubBrowserPanel()}</div>${commandAcademy()}</section></div></main>`}
function showRealStepInfo(i){const x=realSteps[i];toast(`第 ${i+1} 步：${x.title}`)}
function terminalPanel(){const r=ensureRealLab(),l=r.local;return `<section class="real-panel"><div class="real-panel-head"><span><span class="window-dots"><i></i><i></i><i></i></span> Terminal／終端機</span><span>${esc(l.cwd)}</span></div><div class="terminal"><div id="real-terminal-output" class="terminal-output">${r.terminal.map(x=>`<div class="term-line ${x.kind||''}">${esc(x.text)}</div>`).join('')}</div><div class="terminal-input-row"><span class="prompt">alex@laptop:${esc(l.cwd)}$</span><input id="real-terminal-input" class="terminal-input" value="${esc(r.terminalInput||'')}" oninput="ensureRealLab().terminalInput=this.value" onkeydown="if(event.key==='Enter')runRealCommand()" autocomplete="off" spellcheck="false" placeholder="在這裡輸入 Git 指令"><button class="run-command" onclick="runRealCommand()">Enter</button></div></div></section>`}
function termPush(text,kind=''){const r=ensureRealLab();r.terminal.push({text,kind});if(r.terminal.length>120)r.terminal=r.terminal.slice(-120)}
function runRealCommand(prefill){const r=ensureRealLab(),l=r.local,g=r.github;let raw=(prefill!==undefined?prefill:r.terminalInput||'').trim();if(!raw)return;r.terminalInput='';r.lastCommand=raw;termPush('$ '+raw,'command');const cmd=raw.replace(/\s+/g,' ').trim();
  const ok=t=>termPush(t,'success'),muted=t=>termPush(t,'muted'),err=t=>termPush(t,'error');
  if(cmd==='clear'){r.terminal=[];save();return}
  if(cmd==='help'){muted('常用：git --version、git config、git init、git status、git add、git commit、git log、git diff、git switch、git branch、git remote、git push、git pull、git clone、git fetch、git restore、git revert、git stash');save();return}
  if(cmd==='git --version'){r.setup.gitChecked=true;ok('git version 2.51.0');save();return}
  if(cmd==='gh auth login'){r.setup.auth=true;ok('Opening github.com in your browser...\n✓ Authentication complete. Logged in to github.com as alex');save();return}
  if(/^git config --global user\.name /i.test(cmd)){r.setup.name=true;ok('已設定 Git 作者名稱');save();return}
  if(/^git config --global user\.email /i.test(cmd)){r.setup.email=true;ok('已設定 Git 作者 Email');save();return}
  if(cmd==='git config --list'){muted(`user.name=${r.setup.name?'Alex':'（尚未設定）'}\nuser.email=${r.setup.email?'alex@example.com':'（尚未設定）'}`);save();return}
  if(/^mkdir (campus-market|.+)$/i.test(cmd)){l.folder=true;ok('已建立資料夾 campus-market');save();return}
  if(cmd==='cd campus-market'){if(!l.folder){err('cd: no such file or directory: campus-market')}else{l.inFolder=true;l.cwd='~/campus-market';ok('目前位置：~/campus-market')}save();return}
  if(/^touch /i.test(cmd)){if(!l.inFolder){err('touch: 請先 cd 進入 campus-market')}else{raw.slice(6).trim().split(/\s+/).forEach(f=>{if(f){l.files[f]=l.files[f]||'';if(!l.dirty.includes(f))l.dirty.push(f)}});ok('已建立空白檔案：'+raw.slice(6).trim())}save();return}
  if(cmd==='pwd'){muted(l.cwd.replace('~','/Users/alex'));save();return}
  if(cmd==='ls'||cmd==='ls -la'){muted(l.inFolder?(Object.keys(l.files).join('\n')||'(資料夾目前是空的)'):'campus-market');save();return}
  if(cmd==='git init'){if(!l.inFolder){err('fatal: cannot create repository outside the project folder')}else{l.git=true;ok('Initialized empty Git repository in ~/campus-market/.git/')}save();return}
  if(!l.git&&cmd.startsWith('git ')){err('fatal: not a git repository (or any of the parent directories): .git');save();return}
  if(cmd==='git status'){muted(realGitStatus());save();return}
  if(cmd==='git add .'||cmd==='git add -A'){l.staged=[...new Set([...Object.keys(l.files)])];ok('已將目前所有檔案加入 Staging Area');save();return}
  if(/^git add /i.test(cmd)){const f=raw.slice(raw.toLowerCase().indexOf('git add ')+8).trim();if(l.files[f]===undefined)err(`fatal: pathspec '${f}' did not match any files`);else{if(!l.staged.includes(f))l.staged.push(f);ok(`已暫存 ${f}`)}save();return}
  const cm=raw.match(/^git commit -m ["'](.+)["']$/i);if(cm){if(!l.staged.length){err('nothing to commit, working tree clean')}else{const id=('000000'+(l.commits.length+1).toString(16)).slice(-7);l.commits.push({id,message:cm[1],branch:l.branch,files:clone(l.files)});l.dirty=l.dirty.filter(f=>!l.staged.includes(f));l.staged=[];ok(`[${l.branch} ${id}] ${cm[1]}\n ${Object.keys(l.files).length} files changed`);if(l.branch==='feature/competitor-research'&&/幣別|單位/.test(cm[1])&&g.pr){g.pr.fixCommit=true}}save();return}
  if(cmd.startsWith('git log')){if(!l.commits.length)err("fatal: your current branch 'main' does not have any commits yet");else muted([...l.commits].reverse().map(c=>`* ${c.id} (${c.branch}) ${c.message}`).join('\n'));save();return}
  if(cmd==='git diff'||cmd==='git diff --staged'){muted(realDiffText(cmd.includes('--staged')));save();return}
  if(cmd==='git branch -M main'){l.branch='main';if(!l.branches.includes('main'))l.branches.push('main');ok('目前分支已命名為 main');save();return}
  if(/^git remote add origin /i.test(cmd)){if(!g.repo){err('請先在右側 GitHub 建立 Repository')}else{l.remote='https://github.com/alex/campus-market.git';ok('已新增遠端 origin')}save();return}
  if(cmd==='git remote -v'){muted(l.remote?`origin  ${l.remote} (fetch)\norigin  ${l.remote} (push)`:'（尚未設定遠端）');save();return}
  const sw=cmd.match(/^git switch -c (.+)$/i);if(sw){const b=sw[1];if(l.branches.includes(b))err(`fatal: a branch named '${b}' already exists`);else{l.branches.push(b);l.branch=b;if(b==='feature/competitor-research')l.branchCreated=true;ok(`Switched to a new branch '${b}'`)}save();return}
  const sw2=cmd.match(/^git switch (.+)$/i);if(sw2){const b=sw2[1];if(!l.branches.includes(b))err(`fatal: invalid reference: ${b}`);else{l.branch=b;ok(`Switched to branch '${b}'`)}save();return}
  if(cmd==='git branch'){muted(l.branches.map(b=>(b===l.branch?'* ':'  ')+b).join('\n'));save();return}
  const bd=cmd.match(/^git branch -d (.+)$/i);if(bd){const b=bd[1];if(b===l.branch)err(`error: Cannot delete branch '${b}' checked out`);else if(!l.branches.includes(b))err(`error: branch '${b}' not found`);else if(!g.pr||!g.pr.merged)err(`error: The branch '${b}' is not fully merged.`);else{l.branches=l.branches.filter(x=>x!==b);l.branchDeleted=true;ok(`Deleted branch ${b}.`)}save();return}
  const push=cmd.match(/^git push(?: -u)? origin(?: (.+))?$/i);if(push||cmd==='git push'){const branch=(push&&push[1])||l.branch;if(!r.setup.auth){err('fatal: Authentication failed. 請先執行 gh auth login')}else if(!l.remote){err('fatal: No configured push destination.')}else if(!l.commits.some(c=>c.branch===branch)&&branch!=='main'){err(`error: src refspec ${branch} does not match any`)}else{if(!l.pushed.includes(branch))l.pushed.push(branch);if(g.pr&&branch==='feature/competitor-research'&&l.commits.some(c=>c.branch===branch&&/幣別|單位/.test(c.message))){g.pr.fixed=true;g.pr.fixPushed=true}ok(`Enumerating objects... done.\nTo github.com:alex/campus-market.git\n * [new branch] ${branch} -> ${branch}`)}save();return}
  if(/^git pull(?: origin main)?$/i.test(cmd)){if(!g.pr||!g.pr.merged){muted('Already up to date.')}else{l.synced=true;l.files=clone(g.repo.files);ok('Updating local main...\nFast-forward\n market-plan.md | 8 ++++++++')}save();return}
  if(cmd==='git fetch'||cmd==='git fetch origin'){ok('已下載遠端分支與 Commit 資訊，但尚未修改工作檔案。');save();return}
  if(/^git clone /i.test(cmd)){ok('Cloning into campus-market...\nremote: Enumerating objects... done.\nReceiving objects: 100%');save();return}
  if(/^git restore /i.test(cmd)){muted('模擬：已將尚未 Commit 的檔案還原為上一個版本。');save();return}
  if(/^git revert /i.test(cmd)){muted('模擬：已建立一筆新的反向 Commit；既有歷史沒有被刪除。');save();return}
  if(cmd==='git stash'||cmd==='git stash push'){muted('Saved working directory and index state WIP on '+l.branch);save();return}
  if(cmd==='git stash pop'){muted('已恢復最近暫存的工作內容。');save();return}
  if(/^git merge /i.test(cmd)){muted('模擬：把指定分支的 Commit 合併到目前分支。團隊專案通常透過 GitHub PR 完成主要合併。');save();return}
  if(/^git rm /i.test(cmd)){muted('模擬：已刪除檔案並將刪除動作加入 Staging Area。');save();return}
  if(/^git mv /i.test(cmd)){muted('模擬：已重新命名或移動檔案；Git 會在 Commit 中記錄變更。');save();return}
  if(/^git tag /i.test(cmd)){muted('模擬：已建立版本標籤。可用 git tag 查看。');save();return}
  if(/^git show /i.test(cmd)){muted('模擬：顯示指定 Commit 的作者、訊息與逐行差異。');save();return}
  if(/^git checkout /i.test(cmd)){muted('checkout 是舊式多用途指令；本教材建議切換分支使用 git switch。');save();return}
  err(`找不到指令：${cmd}\n輸入 help 查看本教材支援的 Git 指令。`);save()
}
function realGitStatus(){const l=ensureRealLab().local;let out=`On branch ${l.branch}\n`;if(!l.commits.length)out+='\nNo commits yet\n';if(l.staged.length)out+='\nChanges to be committed:\n'+l.staged.map(f=>'  new file:   '+f).join('\n')+'\n';const un=l.dirty.filter(f=>!l.staged.includes(f));if(un.length)out+='\nChanges not staged for commit:\n'+un.map(f=>'  modified:   '+f).join('\n')+'\n';const untracked=Object.keys(l.files).filter(f=>!l.staged.includes(f)&&!l.commits.some(c=>c.files&&c.files[f]!==undefined));if(untracked.length)out+='\nUntracked files:\n'+untracked.map(f=>'  '+f).join('\n')+'\n';if(!l.staged.length&&!un.length&&!untracked.length)out+='\nnothing to commit, working tree clean';return out}
function realDiffText(staged){const l=ensureRealLab().local,files=staged?l.staged:l.dirty;if(!files.length)return '(沒有可顯示的差異)';return files.map(f=>`diff --git a/${f} b/${f}\n--- a/${f}\n+++ b/${f}\n+ ${String(l.files[f]).split('\n').slice(-4).join('\n+ ')}`).join('\n')}
function localWorkspacePanel(){const r=ensureRealLab(),l=r.local,files=Object.keys(l.files),sel=r.selectedLocalFile;return `<section class="real-panel local-workspace"><div class="real-panel-head"><span>Explorer／本機專案檔案</span><span>${l.git?'● Git 已啟用':'尚未 git init'}</span></div><div class="local-body"><div class="local-path">${esc(l.cwd)} ${l.branch?`｜branch: ${esc(l.branch)}`:''}</div><div class="local-toolbar"><button id="starter-files-btn" class="dark-btn primary" onclick="createStarterFiles()" ${!(l.git&&files.length<3)?'disabled':''}>建立教學範例文件（快捷）</button><button id="feature-template-btn" class="dark-btn blue" onclick="addFeatureContent()" ${!(l.branch==='feature/competitor-research')?'disabled':''}>加入競品分析</button><button id="fix-template-btn" class="dark-btn blue" onclick="fixFeatureContent()" ${!(ensureRealLab().github.pr&&ensureRealLab().github.pr.review==='changes_requested')?'disabled':''}>依 Review 修正</button></div><div class="file-explorer"><div class="file-tree"><button class="folder">▾ campus-market</button>${files.length?files.map(f=>`<button class="${sel===f?'active':''}" onclick="selectRealFile('${esc(f)}')">${f==='.gitignore'?'◌':'▤'} ${esc(f)}${l.staged.includes(f)?'  A':l.dirty.includes(f)?'  M':''}</button>`).join(''):'<div style="padding:8px;color:#8b949e;font-size:10px">資料夾是空的</div>'}</div><div class="file-editor-dark">${sel!==null?`<div class="editor-dark-head">${esc(sel)}</div><textarea class="editor-dark-area" oninput="ensureRealLab().editorDraft=this.value">${esc(r.editorDraft)}</textarea><div class="editor-dark-foot"><span>UTF-8 · Markdown</span><button class="dark-btn primary" onclick="saveRealFile()">儲存檔案</button></div>`:`<div style="display:grid;place-items:center;min-height:200px;color:#8b949e;font-size:11px;padding:20px;text-align:center">選擇左側檔案即可查看與編輯。<br>建立檔案後，Git status 會顯示它們。</div>`}</div></div></div></section>`}
function createStarterFiles(){const r=ensureRealLab(),l=r.local;if(!l.git){toast('請先完成 git init');return}l.files['README.md']='# 校園永續市集\n\n行銷管理課期末專案：企劃、網站與簡報。\n';l.files['market-plan.md']='# 市集企劃\n\n## 活動目標\n- 招募 20 個攤位\n- 吸引 300 名學生\n\n## 競品研究\n- 待補\n';l.files['.gitignore']='node_modules/\n.env\n.DS_Store\n';l.dirty=[...new Set([...l.dirty,'README.md','market-plan.md','.gitignore'])];r.selectedLocalFile='README.md';r.editorDraft=l.files['README.md'];save();toast('已建立 README、企劃文件與 .gitignore')}
function selectRealFile(f){const r=ensureRealLab();r.selectedLocalFile=f;r.editorDraft=r.local.files[f]||'';save()}
function saveRealFile(){const r=ensureRealLab(),f=r.selectedLocalFile;if(!f)return;r.local.files[f]=r.editorDraft;if(!r.local.dirty.includes(f))r.local.dirty.push(f);save();toast(`${f} 已儲存；尚未 Commit`)}
function addFeatureContent(){const r=ensureRealLab(),l=r.local;if(l.branch!=='feature/competitor-research'){toast('請先建立並切換到 feature Branch');return}const f='market-plan.md';l.files[f]=(l.files[f]||'')+`\n## 競品 A：逢甲週末市集\n- 客群：大學生與觀光客\n- 宣傳：社群聯名折扣\n- 攤位費：5000\n\n## 競品 B：審計新村市集\n- 客群：文創與親子客群\n- 宣傳：創作者故事內容\n- 攤位費：新台幣 4,500 元\n`;if(!l.dirty.includes(f))l.dirty.push(f);r.selectedLocalFile=f;r.editorDraft=l.files[f];save();toast('已加入競品資料；保留一個幣別錯誤供 Review')}
function fixFeatureContent(){const r=ensureRealLab(),l=r.local,f='market-plan.md';l.files[f]=(l.files[f]||'').replace('攤位費：5000','攤位費：新台幣 5,000 元');if(!l.dirty.includes(f))l.dirty.push(f);r.selectedLocalFile=f;r.editorDraft=l.files[f];save();toast('已修正攤位費；請 add、commit、push')}
function githubBrowserPanel(){const r=ensureRealLab(),g=r.github;return `<section class="real-panel github-window"><div class="real-panel-head"><span>Browser／GitHub.com 教學鏡像</span><span>非 GitHub 官方網站</span></div><div class="browser-bar"><span class="browser-logo">GH</span><div class="browser-search">Type / to search</div><button class="browser-icon">＋</button><button class="browser-icon">◉</button><button class="browser-icon">Alex</button></div><div class="github-content">${githubView()}</div></section>`}

function setGhTab(t){const g=ensureRealLab().github;g.tab=t;save()}
function realCodeView(){const r=ensureRealLab(),l=r.local,g=r.github;if(!l.pushed.includes('main'))return `<div class="quick-setup"><div class="quick-title">Quick setup — if you’ve done this kind of thing before</div><div class="quick-body"><p>這是一個空 Repository。把本機既有專案連到這裡：</p><div class="quick-command">git remote add origin https://github.com/alex/campus-market.git<br>git branch -M main<br>git push -u origin main</div><p class="gh-help">Commit 在本機；push 才會把它上傳到這裡。</p></div></div>`;g.repo.files=clone(l.branch==='main'?l.files:(g.pr&&g.pr.merged?l.files:g.repo.files||l.files));const commit=l.commits[l.commits.length-1];return `<div style="display:flex;justify-content:space-between;margin-bottom:10px"><select class="gh-select" style="width:160px"><option>main</option>${l.pushed.filter(x=>x!=='main').map(b=>`<option>${esc(b)}</option>`).join('')}</select><span class="gh-chip">${l.commits.length} commits</span></div><div class="repo-file-table">${Object.keys(g.repo.files).map(f=>`<div class="repo-file-row"><b>${esc(f)}</b><span>${esc(commit?commit.message:'Initial commit')}</span><span>now</span></div>`).join('')}</div><div class="gh-box" style="margin-top:12px"><div class="gh-box-head"><b>README.md</b></div><div class="gh-box-body"><h1>校園永續市集</h1><p>行銷管理課期末專案：企劃、網站與簡報。</p></div></div>`}
function realProjectsView(){const g=ensureRealLab().github;if(!g.project)return `<div class="empty-hero"><div class="big-icon">▦</div><h2>Organize your work with Projects</h2><p>Project 可把 Issue 與 PR 放在看板或表格中追蹤。</p><button id="create-project-real" class="gh-btn green" onclick="createRealProject()">New project</button></div>`;const status=g.pr&&g.pr.merged?'done':g.pr?'review':g.issue?'progress':'todo';return `<div class="gh-box"><div class="gh-box-head"><div><b>校園市集開發看板</b> <span class="gh-chip">Board</span></div><button class="gh-btn">＋ Add item</button></div><div class="gh-box-body"><div class="gh-project">${[['todo','Todo'],['progress','In progress'],['review','In review'],['done','Done']].map(([id,t])=>`<div class="gh-project-col"><h3><span>${t}</span><span>${status===id?1:0}</span></h3>${g.issue&&status===id?`<div class="gh-project-card"><b>#1 ${esc(g.issue.title)}</b><span class="gh-chip purple">market research</span><p>Assignee: Alex</p></div>`:''}</div>`).join('')}</div></div></div>`}
function createRealProject(){const g=ensureRealLab().github;g.project={title:'校園市集開發看板',layout:'board',columns:['Todo','In progress','In review','Done']};save();toast('Project 看板已建立')}
function realIssuesView(){const g=ensureRealLab().github;if(!g.issue)return `<div class="gh-box"><div class="gh-box-head"><b>Issues</b><button id="new-issue-real" class="gh-btn green" onclick="gNewIssueForm()">New issue</button></div><div class="gh-box-body"><div class="empty-hero"><h2>No results</h2><p>建立第一張可指派、可驗收的任務卡。</p></div></div></div>`;if(g.issue.form)return realIssueForm();return `<div class="gh-box"><div class="gh-box-head"><b>Open issues</b><button class="gh-btn green" onclick="gNewIssueForm()">New issue</button></div><div class="gh-list-row"><span class="gh-open">●</span><div><h3>#1 ${esc(g.issue.title)}</h3><p>Opened by Alex · Assignee: Alex · Project: 校園市集開發看板</p></div><span class="gh-chip purple">market research</span></div></div>`}
function gNewIssueForm(){const g=ensureRealLab().github;g.issue={form:true,title:'',body:'',assignee:'Alex'};save()}
function realIssueForm(){return `<div class="gh-form" style="padding-top:0"><h1>New issue</h1><div class="gh-field"><label>Add a title</label><input id="issue-title-real" class="gh-input" value="新增兩個競品分析"></div><div class="gh-field"><label>Description</label><textarea class="gh-textarea">## 任務背景\n補足校園市集定位所需的競品資料。\n\n## 完成條件\n- 新增逢甲與審計新村兩個競品\n- 比較客群、宣傳方法與攤位費\n- 所有金額必須標示幣別與單位</textarea></div><div class="gh-field"><label>Assignees</label><select class="gh-select"><option>Alex</option></select></div><div class="gh-field"><label>Projects</label><select class="gh-select"><option>校園市集開發看板</option></select></div><button id="submit-issue-real" class="gh-btn green" onclick="submitRealIssue()">Submit new issue</button></div>`}
function submitRealIssue(){const g=ensureRealLab().github;g.issue={id:1,title:'新增兩個競品分析',body:'新增逢甲與審計新村，並比較客群、宣傳方法與攤位費。',assignee:'Alex',label:'market research',project:g.project?g.project.title:null,state:'open'};save();toast('Issue #1 已建立並加入 Project')}
function realPullsView(){const r=ensureRealLab(),l=r.local,g=r.github;if(!g.pr){if(!l.pushed.includes('feature/competitor-research'))return `<div class="gh-box"><div class="gh-box-head"><b>Pull requests</b><button class="gh-btn green" disabled>New pull request</button></div><div class="gh-box-body"><div class="empty-hero"><h2>No pull requests</h2><p>先把功能 Branch push 到 GitHub，才能比較並建立 PR。</p></div></div></div>`;return `<div class="gh-form" style="padding-top:0"><h1>Open a pull request</h1><div style="display:flex;gap:8px;margin:12px 0"><span class="gh-chip">base: main</span><span>←</span><span class="gh-chip">compare: feature/competitor-research</span></div><div class="gh-field"><label>Title</label><input class="gh-input" value="新增逢甲與審計新村競品分析"></div><div class="gh-field"><label>Description</label><textarea class="gh-textarea">## 修改內容\n- 新增兩個競品案例\n- 比較客群、宣傳方法與攤位費\n\n## 請協助檢查\n- 金額格式與資料完整性\n\nCloses #1</textarea></div><button id="create-pr-real" class="gh-btn green" onclick="createRealPR()">Create pull request</button></div>`}return realPRDetail()}
function createRealPR(){const g=ensureRealLab().github;g.pr={id:2,title:'新增逢甲與審計新村競品分析',source:'feature/competitor-research',target:'main',review:'none',comments:[],fixed:false,fixCommit:false,fixPushed:false,merged:false,deleted:false,subtab:'files'};save();toast('Pull Request #2 已建立')}
function realPRDetail(){const g=ensureRealLab().github,p=g.pr;return `<div class="pr-summary"><span class="gh-chip ${p.merged?'purple':'green'}">${p.merged?'Merged':'Open'}</span><h1 class="pr-title-real">${esc(p.title)} <span style="color:#57606a">#2</span></h1></div><p style="color:#57606a;font-size:12px">Alex wants to merge 2 commits into <b>main</b> from <b>feature/competitor-research</b></p><div class="pr-subtabs"><button class="${p.subtab==='conversation'?'active':''}" onclick="ensureRealLab().github.pr.subtab='conversation';save()">Conversation</button><button class="${p.subtab==='commits'?'active':''}" onclick="ensureRealLab().github.pr.subtab='commits';save()">Commits</button><button id="pr-files-real-tab" class="${p.subtab==='files'?'active':''}" onclick="ensureRealLab().github.pr.subtab='files';save()">Files changed</button></div>${p.subtab==='files'?realPRFiles():p.subtab==='commits'?realPRCommits():realPRConversation()}`}
function realPRCommits(){const l=ensureRealLab().local;return `<div class="gh-box">${l.commits.filter(c=>c.branch==='feature/competitor-research').map(c=>`<div class="gh-list-row"><span>●</span><div><h3>${esc(c.message)}</h3><p>${esc(c.id)} · Alex</p></div></div>`).join('')}</div>`}
function realPRFiles(){const g=ensureRealLab().github,p=g.pr;return `<div class="diff-real"><div class="diff-head-real"><b>market-plan.md</b> · 10 additions</div>${['## 競品 A：逢甲週末市集','- 客群：大學生與觀光客','- 宣傳：社群聯名折扣',p.fixed?'- 攤位費：新台幣 5,000 元':'- 攤位費：5000','## 競品 B：審計新村市集','- 攤位費：新台幣 4,500 元'].map((x,i)=>`<div class="diff-line-real add"><span class="ln">${i+9}</span><span>+ ${esc(x)}</span></div>`).join('')}</div><div class="review-panel"><label><b>Review changes</b></label><textarea id="review-body-real" class="gh-textarea" style="min-height:70px">${p.fixed?'已確認幣別與單位修正完成。':'請補上幣別與單位，例如「新台幣 5,000 元」。'}</textarea><div class="gh-choice">${p.fixed?`<label><input type="radio" checked> Approve</label>`:`<label><input type="radio" checked> Request changes</label>`}</div>${p.fixed?`<button id="approve-real-btn" class="gh-btn green" onclick="approveRealPR()">Submit review</button>`:`<button id="review-request-btn" class="gh-btn green" onclick="requestRealChanges()">Submit review</button>`}</div>`}
function requestRealChanges(){const g=ensureRealLab().github,p=g.pr;g.role='志豪';p.review='changes_requested';p.comments.push({author:'志豪',body:'請補上幣別與單位，例如「新台幣 5,000 元」。'});p.subtab='conversation';save();toast('已送出 Request changes')}
function approveRealPR(){const g=ensureRealLab().github,p=g.pr;if(!p.fixed){toast('修正尚未 push');return}g.role='志豪';p.review='approved';p.comments.push({author:'志豪',body:'已確認修正，Approve。'});p.subtab='conversation';save();toast('Pull Request 已核准')}
function realPRConversation(){const g=ensureRealLab().github,p=g.pr;return `<div class="gh-box"><div class="gh-box-body"><p><b>Alex</b> opened this pull request and linked <b>#1</b>.</p>${p.comments.map(c=>`<div style="border-left:3px solid #d0d7de;padding:8px 10px;margin:8px 0"><b>${esc(c.author)}</b><p>${esc(c.body)}</p></div>`).join('')}${p.merged?`<div class="merge-status"><b>Pull request successfully merged and closed</b><p>Issue #1 已關閉，Project 卡片移到 Done。</p>${!p.deleted?`<button id="delete-remote-real-btn" class="gh-btn danger" onclick="deleteRemoteBranch()">Delete branch</button>`:'<span class="gh-chip">Branch deleted</span>'}</div>`:p.review==='approved'?`<div class="merge-status"><b>All checks have passed</b><p>1 approving review</p><button id="merge-real-btn" class="gh-btn green" onclick="mergeRealPR()">Merge pull request</button></div>`:p.review==='changes_requested'?`<div class="merge-status blocked-status"><b>Changes requested</b><p>Merge is blocked until requested changes are resolved.</p></div>`:`<div class="merge-status blocked-status"><b>Review required</b><p>切換到 Files changed，讓隊友檢查實際差異。</p></div>`}</div></div>`}
function markRealFixFromPush(){const r=ensureRealLab();if(r.github.pr&&r.github.pr.fixCommit&&r.github.pr.fixPushed)r.github.pr.fixed=true}
function mergeRealPR(){const r=ensureRealLab(),g=r.github,p=g.pr;if(p.review!=='approved'){toast('需要 Approve 才能 Merge');return}p.merged=true;g.repo.files=clone(r.local.files);if(g.issue)g.issue.state='closed';save();toast('PR 已 Merge，main 正式版更新')}
function deleteRemoteBranch(){const g=ensureRealLab().github;g.pr.deleted=true;save();toast('遠端功能 Branch 已刪除')}
function realCompletion(){return `<div class="real-complete"><h2>✓ 你已從零完成一個 GitHub 專案</h2><p>本機與 GitHub 已同步；Issue、Project、Branch、Commit、Push、PR、Review 與 Merge 都留下可追蹤紀錄。</p><div class="real-complete-grid"><div><b>本機 Git</b><br>init／status／add／commit</div><div><b>遠端同步</b><br>remote／push／pull</div><div><b>團隊協作</b><br>Issue／Project／PR</div><div><b>品質控制</b><br>Diff／Review／Merge</div></div></div>`}
function commandAcademy(){const r=ensureRealLab();const tabs=[['workflow','核心流程'],['inspect','查看與比較'],['sync','遠端同步'],['undo','復原與暫存'],['team','分支與整合'],['files','檔案與標籤'],['github','GitHub 網頁'],['auth','登入與安全']];const groups={workflow:[['git init','讓目前資料夾開始由 Git 管理。'],['git status','查看未追蹤、已修改與已暫存內容。'],['git add <file>','把指定變更放入 Staging Area。'],['git commit -m "訊息"','建立一筆有說明的本機版本。']],inspect:[['git log --oneline --graph --all','用精簡圖形查看所有分支歷史。'],['git diff','查看尚未暫存的逐行差異。'],['git diff --staged','查看下一次 Commit 會包含什麼。'],['git show <commit>','查看指定 Commit 的內容與差異。']],sync:[['git remote -v','查看遠端名稱與網址。'],['git push -u origin main','第一次推送並設定上游分支。'],['git pull origin main','下載並整合遠端 main。'],['git fetch origin','只下載遠端資訊，不修改工作檔案。'],['git clone <url>','把既有遠端 Repository 複製到本機。']],undo:[['git restore <file>','丟棄尚未 Commit 的檔案修改。'],['git restore --staged <file>','把檔案移出 Staging Area，保留內容。'],['git revert <commit>','建立新 Commit 安全撤銷既有 Commit。'],['git stash','暫時收起未完成修改。'],['git stash pop','恢復最近一次 stash。']],team:[['git switch -c <branch>','建立並切換到新分支。'],['git switch main','切換到 main。'],['git branch -d <branch>','刪除已完成且合併的本機分支。'],['git merge <branch>','把指定分支整合到目前分支。'],['git branch','列出本機分支。']],files:[['git rm <file>','刪除檔案並把刪除動作加入暫存。'],['git mv <old> <new>','重新命名或移動檔案。'],['git tag v1.0.0','替重要 Commit 加上版本標籤。'],['.gitignore','列出不應被 Git 追蹤的檔案與資料夾。'],['git checkout <branch>','舊式切換語法；新教材優先使用 git switch。']],github:[['Repository','建立、重新命名、封存或刪除專案空間。'],['Collaborators','邀請組員並設定存取權限。'],['Labels / Milestones','分類 Issue，並把任務組成階段目標。'],['Web editor','可直接在 GitHub 新增或編輯文字檔並 Commit。'],['Releases / Tags','用版本標籤發布可下載成果。'],['Fork / Clone','Fork 建立自己的遠端副本；Clone 複製到本機。']],auth:[['gh auth login','透過 GitHub CLI 與瀏覽器安全登入。'],['ssh-keygen -t ed25519 -C "email"','建立 SSH 金鑰；私鑰不可分享。'],['ssh -T git@github.com','測試 SSH 身份驗證。'],['HTTPS + Credential Manager','使用 HTTPS 時由憑據管理工具保存登入。']]};return `<section class="command-academy"><div class="academy-tabs">${tabs.map(([id,t])=>`<button class="${r.academy===id?'active':''}" onclick="ensureRealLab().academy='${id}';save()">${t}</button>`).join('')}</div><div class="academy-body"><div class="command-grid">${groups[r.academy].map(([c,d])=>`<article class="command-card"><code>${esc(c)}</code><b>${esc(d)}</b><p>${academyExtra(c)}</p>${c.startsWith('git ')&&!c.includes('<commit>')&&!c.includes('<url>')&&!c.includes('<branch>')&&!c.includes('<file>')?`<button class="dark-btn" onclick="prefillRealCommand('${esc(c).replace(/'/g,"\\'")}')">放入終端機</button>`:''}</article>`).join('')}</div>${r.academy==='auth'?`<div style="margin-top:10px;border:1px solid #d29922;background:#3d2f00;border-radius:6px;padding:9px;color:#e3b341;font-size:11px"><b>安全提醒：</b>GitHub 不接受帳號密碼作為 Git HTTPS 密碼。可使用 GitHub CLI／Git Credential Manager、Personal Access Token，或 SSH；Token 與私鑰都不可貼進教材或公開 Repository。</div>`:''}<details style="margin-top:12px;color:#8b949e;font-size:10px"><summary>教材依據與官方文件</summary><p>Git 指令依 git-scm.com/docs；GitHub Repository、Issue、Project、Pull Request、Merge 與驗證流程依 docs.github.com。此畫面為離線教學鏡像，不會連線或操作真實帳號。</p></details></div></section>`}
function academyExtra(c){if(c==='git add <file>')return 'add 不是上傳，而是選擇下一次 Commit 的內容。';if(c.startsWith('git pull'))return 'pull 約等於 fetch 後再整合。';if(c.startsWith('git fetch'))return '適合先查看遠端變化，再決定如何整合。';if(c.startsWith('git revert'))return '共享分支優先使用 revert，不要任意改寫公開歷史。';if(c.startsWith('gh auth'))return '建議初學者使用瀏覽器登入，不要把 Token 寫在指令或檔案。';return '可在完成主線後於終端機沙盒練習。'}
function prefillRealCommand(c){const r=ensureRealLab();r.terminalInput=c;save();setTimeout(()=>document.getElementById('real-terminal-input')?.focus(),0)}
function realFocusTarget(step){const g=ensureRealLab().github;if(step===6)return g.tab==='projects'?'create-project-real':'gh-tab-projects';if(step===7){if(g.tab!=='issues')return'gh-tab-issues';if(!g.issue)return'new-issue-real';if(g.issue.form)return'submit-issue-real'}if(step===10)return g.tab==='pulls'?'create-pr-real':'gh-tab-pulls';if(step===11){if(g.tab!=='pulls')return'gh-tab-pulls';if(g.pr&&g.pr.subtab!=='files')return'pr-files-real-tab';return'review-request-btn'}if(step===13){if(g.tab!=='pulls')return'gh-tab-pulls';if(g.pr&&g.pr.subtab!=='files')return'pr-files-real-tab';return'approve-real-btn'}if(step===14){if(g.tab!=='pulls')return'gh-tab-pulls';return g.pr&&g.pr.merged?'delete-remote-real-btn':'merge-real-btn'}return realSteps[step]&&realSteps[step].target}
function applyRealFocus(){if(state.page!=='real')return;markRealFixFromPush();document.querySelectorAll('.real-highlight').forEach(x=>x.classList.remove('real-highlight'));const r=ensureRealLab(),step=realStep();if(!r.coach)return;const id=realFocusTarget(step);if(!id)return;const el=document.getElementById(id);if(el){el.classList.add('real-highlight');if(step!==0&&step!==1&&step!==3&&step!==5&&step!==8&&step!==15)el.scrollIntoView({block:'center',behavior:'smooth'})}}

function render(){const app=document.getElementById('app');const body=state.page==='story'?storyPage():state.page==='concept'?conceptPage():state.page==='practice'?practicePage():state.page==='real'?realLabPage():state.page==='terms'?termsPage():state.page==='challenge'?challengePage():progressPage();app.innerHTML=header()+body+modalView();setTimeout(()=>{applyDemoFocus();applyStudentFocus();applyRealFocus();const out=document.getElementById('real-terminal-output');if(out)out.scrollTop=out.scrollHeight},0)}
render();
</script>
</body>
