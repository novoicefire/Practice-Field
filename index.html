@media(max-width:860px){.app-header{height:106px;padding:12px 12px 0;align-items:flex-start}.sim-badge,.header-actions .icon-btn{display:none}.main-nav{order:3;position:absolute;top:54px;left:0;right:0;background:#24292f;padding:0 10px 8px}.page{padding-top:0}.story-hero{grid-template-columns:1fr}.phone{max-width:460px}.story-copy{text-align:center}.story-copy p{margin-left:auto;margin-right:auto}.story-actions{justify-content:center}.concept-grid,.progress-grid{grid-template-columns:1fr}.concept-card.full{grid-column:auto}.practice-shell{display:block;padding:14px}.coach-panel{position:static;margin-bottom:12px}.practice-page .page{padding-top:0}.issue-layout,.pr-layout{grid-template-columns:1fr}.mode-grid{grid-template-columns:1fr}.challenge-hero{grid-template-columns:1fr}.project-board{grid-template-columns:repeat(4,240px)}.repo-context{padding-left:14px;padding-right:14px}.repo-actions{display:none}.mobile-coach-toggle{display:block}}

<body>
<div id="app"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
'use strict';
const STORAGE_KEY='github-business-learning-spa-v3';
const clone=v=>JSON.parse(JSON.stringify(v));
const seedFiles={
  'README.md':`# 校園永續市集企劃\n\n這是行銷管理課的期末專案，團隊要完成企劃書、預算、宣傳素材與活動網站。\n\n## 目標\n- 吸引 300 名校內學生參與\n- 招募 20 個攤位\n- 完成可展示的活動網站`,
  'market-research.md':`# 校園市集競品研究\n\n## 競品 A：草悟道假日市集\n- 客群：學生、親子與觀光客\n- 優點：交通方便、攤位選擇多\n- 攤位費：新台幣 3,000 元\n\n## 待補資料\n- 至少再研究兩個競品\n- 比較客群、宣傳方法與攤位費`,
  'budget.md':`# 初步預算\n\n- 場地設備：新台幣 12,000 元\n- 宣傳印刷：新台幣 4,000 元\n- 備用金：新台幣 3,000 元`,
  'social-plan.md':`# 社群宣傳規劃\n\n- 活動預告貼文\n- 攤商募集貼文\n- 倒數貼文`
};
function freshState(){return{
  page:'story',storyStep:0,selectedProblems:[],onboardingComplete:false,
  uiMode:'plain',learningMode:'guided',activeTab:'code',prSubtab:'conversation',
  branch:'main',selectedFile:null,editing:false,draftText:'',modal:null,
  files:{main:clone(seedFiles)},branches:{main:{name:'main',base:null,createdBy:'team'}},
  commits:[{id:'c001',branch:'main',message:'建立校園市集企劃專案',author:'小安',at:'5 天前',files:clone(seedFiles)}],
  issue:{id:12,title:'研究三個校園市集競品',body:'整理至少三個相似市集，供團隊決定活動定位與宣傳方法。',criteria:['至少包含三個競品','比較客群與宣傳方法','每個攤位費都要標示幣別'],assignee:null,label:'市場研究',due:'7 月 28 日',status:'todo',linkedBranch:null},
  pr:null,role:'Alex',projectStatus:'todo',events:[],done:[],demo:{active:false,index:0},challenge:false
}}
let state=load();
function load(){try{return Object.assign(freshState(),JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||{})}catch(e){return freshState()}}
function save(renderNow=true){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));if(renderNow)render()}
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function nl(v=''){return esc(v).replace(/\n/g,'<br>')}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),2400)}
function logEvent(text){state.events.unshift({text,at:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})})}
function done(key){if(!state.done.includes(key))state.done.push(key)}
function setPage(page){state.page=page;state.modal=null;save()}
function label(en,zh){if(state.uiMode==='plain')return `<span>${zh}</span><span class="en-label">${en}</span>`;return `<span class="en-label">${en}</span><span class="zh-label">${zh}</span>`}
function setUiMode(mode){state.uiMode=mode;save()}
function resetAll(){if(confirm('要清除故事進度與全部練習資料嗎？')){state=freshState();save();toast('已重新開始')}}
function header(){const tabs=[['story','故事起點'],['concept','Git 與 GitHub'],['practice','模擬練習'],['terms','名詞地圖'],['challenge','完整挑戰'],['progress','學習成果']];return `<header class="app-header"><div class="brand"><span class="brand-mark">G</span><span>協作練習場</span><span class="sim-badge">教學模擬</span></div><nav class="main-nav" aria-label="主要導覽">${tabs.map(([p,t])=>`<button class="${state.page===p?'active':''}" onclick="setPage('${p}')">${t}</button>`).join('')}</nav><div class="header-actions"><button class="icon-btn" title="重新開始" onclick="resetAll()">↻</button></div></header>`}
function storyPage(){const step=state.storyStep;return `<main class="page story-page"><div class="story-wrap">${step===0?storyIntro():step===1?storyWorkflow():step===2?storyProblems():storyBridge()}</div></main>`}
function storyIntro(){return `<section class="story-hero"><div class="story-copy"><h1>距離期末報告，只剩 5 天。</h1><p>你們四人要完成一份「校園永續市集」企劃書、活動網站與簡報。群組看起來很熱鬧，但現在沒有人能確定哪份才是正式版本。</p><div class="story-actions"><button class="btn primary large" onclick="state.storyStep=1;save()">進入 LINE 群組看看</button><button class="btn ghost large" onclick="setPage('concept')">我已經懂問題，先看概念</button></div><div class="story-note">不需要先懂 Git，也不需要安裝任何軟體。</div></div>${chatPhone()}</section>`}
function chatPhone(){return `<div class="phone" aria-label="LINE 群組情境模擬"><div class="phone-screen"><div class="chat-head"><div class="avatar green">市</div><div><div class="chat-title">行銷管理｜校園市集組</div><div class="chat-sub">4 位成員</div></div></div><div class="chat-body"><div class="message-row"><div class="mini-avatar">安</div><div class="bubble">教授說除了企劃書，還要做一個活動網站。大家照昨天分工做，完成後傳群組。<time>20:14</time></div></div><div class="message-row"><div class="mini-avatar" style="background:#4876a8">豪</div><div class="bubble">我把預算加進去了。<div class="file-attach"><span class="file-icon">📄</span><span class="file-name">校園市集企劃書_最新版.docx</span></div><time>22:08</time></div></div><div class="message-row"><div class="mini-avatar" style="background:#b2667d">芸</div><div class="bubble">我也改了活動日期和海報文案。<div class="file-attach"><span class="file-icon">📄</span><span class="file-name">校園市集企劃書_最新版_佳芸改.docx</span></div><time>22:31</time></div></div><div class="message-row me"><div class="bubble">我剛剛用 AI 補了競品分析，但我是從下午那份開始改的……<div class="file-attach"><span class="file-icon">📄</span><span class="file-name">校園市集企劃書_final_真的最終版2.docx</span></div><time>22:47</time></div></div><div class="message-row"><div class="mini-avatar">安</div><div class="bubble">所以到底要以哪一份為準？而且網站剛剛也被改壞了。<time>22:49</time></div></div></div></div></div>`}
function storyWorkflow(){const steps=[['💡','發想','群組丟很多想法'],['💬','討論','訊息快速往上推'],['👥','分工','一句「我來做」'],['📁','各自修改','複製或下載檔案'],['🧩','人工合併','組長整理所有版本']];return `<section class="story-panel"><h2>這其實是很常見的合作方式</h2><p>LINE、Google Docs 和雲端硬碟都很好用；問題通常不是工具不好，而是專案變複雜後，大家沒有共同的版本與審核流程。</p><div class="workflow-list">${steps.map(x=>`<div class="workflow-step"><span style="font-size:26px">${x[0]}</span><strong>${x[1]}</strong><small>${x[2]}</small></div>`).join('')}</div><div style="margin-top:24px;display:flex;justify-content:flex-end;gap:8px"><button class="btn" onclick="state.storyStep=0;save()">返回群組</button><button class="btn primary" onclick="state.storyStep=2;save()">看看哪裡出問題</button></div></section>`}
function storyProblems(){const problems=[['owner','不知道誰真正負責','「我以為是別人要做」'],['version','同時存在多個版本','「到底哪份才是最新版」'],['history','不知道改了什麼','只看到整份檔案被重新上傳'],['review','錯誤沒有人審核','內容直接進入最後版本'],['restore','AI 改壞後難以回復','不知道要退回哪個時間點'],['status','截止前才確認進度','組長必須逐一在群組追問']];return `<section class="story-panel"><h2>先不要背名詞，請找出合作問題</h2><p>點選你認為這個小組遇到的問題。這些問題之後都會對應到一個具體的協作方法。</p><div class="problem-grid">${problems.map(([k,t,d])=>`<button class="problem-card ${state.selectedProblems.includes(k)?'selected':''}" onclick="toggleProblem('${k}')"><b>${t}</b><span>${d}</span></button>`).join('')}</div><div class="warning">你不需要選到「標準答案」；這一步是要把原本模糊的不順，轉成可以處理的問題。</div><div style="margin-top:20px;display:flex;justify-content:space-between;gap:8px"><button class="btn" onclick="state.storyStep=1;save()">上一步</button><button class="btn primary" onclick="state.storyStep=3;state.onboardingComplete=true;done('diagnose');save()">整理成協作需求</button></div></section>`}
function toggleProblem(k){const i=state.selectedProblems.indexOf(k);i>=0?state.selectedProblems.splice(i,1):state.selectedProblems.push(k);save()}
function storyBridge(){return `<section class="story-panel"><h2>我們需要的不是更多群組訊息，而是一套共同流程</h2><p>先把問題翻成需求，之後 Git 和 GitHub 的每個名詞才會有意義。</p><div class="bridge-map"><div class="bridge-side"><div class="bridge-item">誰負責、何時完成？</div><div class="bridge-item">在哪裡安全修改？</div><div class="bridge-item">這次到底改了什麼？</div><div class="bridge-item">誰檢查過才算正式？</div></div><div class="bridge-arrow">→</div><div class="bridge-side"><div class="bridge-item"><b>任務要可指派、可驗收</b></div><div class="bridge-item"><b>正式版與個人修改要分開</b></div><div class="bridge-item"><b>每次版本要有原因與紀錄</b></div><div class="bridge-item"><b>修改先送審，再正式採用</b></div></div></div><p style="font-weight:700;color:var(--story-ink)">Git 負責版本紀錄；GitHub 把版本紀錄、分工、討論與審核放進同一個專案空間。</p><div style="display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap"><button class="btn" onclick="state.storyStep=2;save()">上一步</button><button class="btn primary large" onclick="setPage('concept')">現在再認識 Git 與 GitHub</button></div></section>`}
function conceptPage(){return `<main class="page concept-page"><div class="container"><div class="page-title"><div><h1>先理解行為，再記英文名詞</h1><p>Git 不是網站，GitHub 也不只是放程式碼的雲端硬碟。先從分組報告的版本與協作需求理解兩者差異。</p></div><div class="page-title-actions"><button class="btn primary" onclick="enterPractice('guided')">進入引導練習</button></div></div><div class="concept-grid"><article class="concept-card"><h2>Git：不會忘記的版本紀錄員</h2><p>每完成一段有意義的工作，就留下「誰、何時、做了什麼、為什麼」的紀錄；必要時可以比較或回到先前版本。</p><div class="version-timeline"><div class="version-node"><strong>建立企劃書骨架</strong><small>小安 · 星期一 20:10</small></div><div class="version-node"><strong>新增三家競品分析</strong><small>Alex · 星期二 18:42</small></div><div class="version-node"><strong>修正攤位費幣別</strong><small>Alex · 星期二 21:05</small></div></div><div class="chip green">Commit＝一次有說明的版本存檔</div></article><article class="concept-card"><h2>GitHub：團隊共同使用版本紀錄的空間</h2><p>除了保存 Git 的版本歷史，GitHub 還讓團隊建立任務、平行修改、提出修改申請、逐行審核及追蹤專案進度。</p><div class="term-flow"><span class="node">Issue<br><small>任務</small></span><span class="arr">→</span><span class="node">Branch<br><small>個人工作版</small></span><span class="arr">→</span><span class="node">Commit<br><small>版本紀錄</small></span><span class="arr">→</span><span class="node">PR<br><small>送審</small></span><span class="arr">→</span><span class="node">Merge<br><small>正式採用</small></span></div></article><article class="concept-card full"><h2>為什麼不只用 LINE、Google Docs 或 Google Drive？</h2><table class="tool-table"><thead><tr><th>工具</th><th>最擅長的事</th><th>專案變複雜後的限制</th></tr></thead><tbody><tr><td>LINE</td><td>快速討論、通知</td><td>任務、決策與檔案容易被訊息淹沒</td></tr><tr><td>Google Docs</td><td>多人同時編輯一份文件</td><td>不適合管理網站、圖片、資料與多個檔案組成的完整產品</td></tr><tr><td>Google Drive</td><td>儲存、分享檔案</td><td>很容易產生複製檔、最終版與人工整併</td></tr><tr><td>Git</td><td>精確記錄檔案版本差異</td><td>本身不負責團隊任務、審核與網頁協作介面</td></tr><tr><td>GitHub</td><td>把版本、任務、討論、審核與正式版放在一起</td><td>需要先理解一套新的協作流程</td></tr></tbody></table></article><article class="concept-card full"><h2>選擇學習方式</h2><p>同一個情境可以先看系統逐步示範，再跟著提示操作，最後移除提示自行完成。</p><div class="mode-grid"><div class="mode-card"><h3>看一次</h3><p>每一步都會停下來說明原因，必須由你按「下一步」才會繼續。</p><button class="btn primary" onclick="startDemo()">播放逐步示範</button></div><div class="mode-card"><h3>跟著做</h3><p>系統只提示目前目標、成功條件與下一個合理行動，不會直接替你完成。</p><button class="btn primary" onclick="enterPractice('guided')">開始引導練習</button></div><div class="mode-card"><h3>自己做</h3><p>不顯示逐步答案，只留下任務與驗收條件，完成後依協作紀錄評分。</p><button class="btn" onclick="setPage('challenge')">查看完整挑戰</button></div></div></article></div></div></main>`}
function enterPractice(mode='guided'){state.page='practice';state.learningMode=mode;state.challenge=mode==='challenge';state.activeTab=mode==='guided'?'issues':'code';save()}
function practicePage(){return `<main class="page practice-page mode-${state.uiMode}">${repoHeader()}<div class="practice-shell">${coachPanel()}<section class="sim-main">${practiceContent()}</section>${inspectorPanel()}</div>${state.demo.active?demoOverlay():''}</main>`}
function repoHeader(){const counts={issues:state.issue.status==='done'?0:1,pr:state.pr&&state.pr.status!=='merged'?1:0};const tabs=[['code','Code','檔案'],['issues','Issues','任務'],['pulls','Pull requests','修改申請'],['projects','Projects','專案看板'],['graph','Git graph','Git 透視']];return `<div class="repo-context"><div class="repo-topline"><div class="repo-name"><span>📁</span><span class="repo-owner">campus-market</span><span>/</span><b>semester-project</b><span class="repo-visibility">Public</span></div><div class="repo-actions"><button class="repo-action">☆ Star</button><button class="repo-action">⑂ Fork</button></div></div><nav class="repo-tabs" aria-label="模擬 GitHub 分頁">${tabs.map(([id,en,zh])=>`<button id="tab-${id}" class="${state.activeTab===id?'active':''}" onclick="setTab('${id}')">${label(en,zh)}${id==='issues'?` <span class="count">${counts.issues}</span>`:id==='pulls'?` <span class="count">${counts.pr}</span>`:''}</button>`).join('')}</nav></div>`}
function setTab(tab){state.activeTab=tab;state.selectedFile=null;state.editing=false;state.modal=null;save()}
function coachPanel(){if(state.challenge)return `<aside class="side-panel coach-panel"><div class="panel-head">完整挑戰</div><div class="panel-body"><div class="coach-goal">截止前 45 分鐘</div><div class="coach-title">獨立完成一次協作流程</div><div class="coach-copy">系統不會告訴你下一個按鈕。請依任務、版本與審核狀態自行判斷。</div>${workflowChecklist()}</div></aside>`;const c=coachState();return `<aside class="side-panel coach-panel"><div class="panel-head">學習教練</div><div class="panel-body"><div class="coach-goal">目前目標</div><div class="coach-title">${c.title}</div><div class="coach-copy">${c.copy}</div><button class="btn primary coach-action" onclick="${c.action}">${c.button}</button><button class="btn coach-action" onclick="startDemo()">從頭播放示範</button>${workflowChecklist()}</div></aside>`}
function coachState(){if(!state.issue.assignee)return{title:'先把模糊分工變成可執行任務',copy:'一張好 Issue 要包含負責人與可驗收的完成條件。先查看 #12。',button:'前往 Issue #12',action:"setTab('issues')"};if(!state.issue.linkedBranch)return{title:'建立不影響正式版的工作空間',copy:'main 是正式版本。請從任務建立自己的 Branch，再開始修改。',button:'從 Issue 建立 Branch',action:'createBranch()'};if(!state.done.includes('commit'))return{title:'修改檔案並留下版本紀錄',copy:'補上兩個競品，並刻意保留「攤位費：5000」讓之後的 Review 發現問題。',button:'開啟競品研究檔案',action:"openFile('market-research.md')"};if(!state.pr)return{title:'把修改送給隊友審核',copy:'先比較 main 與你的 Branch，再填寫 PR 標題和說明。',button:'建立 Pull Request',action:'openPRForm()'};if(state.pr.reviewStatus==='none')return{title:'切換隊友角色，檢查實際差異',copy:'到 Files changed 對「攤位費：5000」留下逐行留言，並 Request changes。',button:'切換為志豪並看差異',action:'startReview()'};if(state.pr.reviewStatus==='changes_requested'&&!isFixed())return{title:'依 Review 修正內容',copy:'切回 Alex，補上「新台幣」與「元」，再建立一筆新的 Commit。',button:'切回 Alex 並修正',action:'fixFromReview()'};if(state.pr.reviewStatus!=='approved')return{title:'重新確認修正並核准',copy:'隊友需要確認新版本已處理回饋，再 Approve。',button:'切換志豪並核准',action:'approvePR()'};if(state.pr.status!=='merged')return{title:'把核准內容放入正式版',copy:'Merge 之後 main 才會更新，Issue 與 Project 也應同步完成。',button:'Merge pull request',action:'mergePR()'};return{title:'你完成了一輪協作',copy:'回到 Git 透視模式，看看 Branch 與 Commit 如何合併回 main。',button:'查看 Git 透視',action:"setTab('graph')"}}
function workflowChecklist(){const items=[['issue','建立可驗收 Issue'],['branch','建立個人 Branch'],['commit','修改並 Commit'],['pr','建立 Pull Request'],['review','Review 與修正'],['merge','Merge 並更新看板']];let current=items.findIndex(x=>!state.done.includes(x[0]));return `<ul class="checklist">${items.map((x,i)=>`<li class="${state.done.includes(x[0])?'done':i===current?'now':''}">${x[1]}</li>`).join('')}</ul>`}
function practiceContent(){switch(state.activeTab){case'issues':return issuesView();case'pulls':return pullsView();case'projects':return projectView();case'graph':return graphView();default:return codeView()}}
function codeView(){if(state.editing&&state.selectedFile)return editorView();if(state.selectedFile)return fileView();const files=currentFiles();const last=latestCommit();return `<div class="branch-toolbar"><div class="toolbar-left"><select id="branch-selector" class="branch-select" onchange="switchBranch(this.value)">${Object.keys(state.branches).map(b=>`<option ${state.branch===b?'selected':''} value="${esc(b)}">${esc(b)}</option>`).join('')}</select><span class="chip">${Object.keys(files).length} files</span></div><div class="toolbar-right"><div class="ui-mode" aria-label="介面顯示模式"><button class="${state.uiMode==='plain'?'active':''}" onclick="setUiMode('plain')">白話</button><button class="${state.uiMode==='compare'?'active':''}" onclick="setUiMode('compare')">對照</button><button class="${state.uiMode==='real'?'active':''}" onclick="setUiMode('real')">實戰</button></div>${state.branch==='main'?`<button id="create-branch-btn" class="btn" onclick="createBranch()">${label('Create branch','建立工作版本')}</button>`:''}</div></div><div class="box"><div class="box-head"><div><b>${esc(state.branch)}</b> <span style="color:var(--muted)">· ${esc(last.message)}</span></div><span class="chip">${state.commits.filter(c=>c.branch===state.branch).length} commits</span></div><div class="file-table">${Object.keys(files).map(name=>`<div class="file-row"><button class="file-link" onclick="openFile('${esc(name)}')">▤ ${esc(name)}</button><span class="commit-summary">${esc(last.message)}</span><span class="age">${esc(last.at)}</span></div>`).join('')}</div></div><div class="box readme"><div class="box-head"><b>README.md</b></div><div class="box-body">${markdown(files['README.md'])}</div></div>`}
function currentFiles(){return state.files[state.branch]||state.files.main}
function latestCommit(){return [...state.commits].reverse().find(c=>c.branch===state.branch)||state.commits[0]}
function switchBranch(branch){state.branch=branch;state.selectedFile=null;state.editing=false;save()}
function openFile(name){state.selectedFile=name;state.editing=false;state.draftText=currentFiles()[name]||'';state.activeTab='code';save()}
function fileView(){const txt=currentFiles()[state.selectedFile]||'';return `<div class="branch-toolbar"><div class="toolbar-left"><button class="btn small" onclick="state.selectedFile=null;state.editing=false;save()">← 返回檔案</button><span class="chip">${esc(state.branch)}</span></div><div class="toolbar-right">${state.branch!=='main'?`<button id="edit-file-btn" class="btn primary" onclick="startEdit()">${label('Edit this file','編輯這個檔案')}</button>`:'<span class="warning">你正在查看 main 正式版；請先建立 Branch 才能安全修改。</span>'}</div></div><div class="box"><div class="box-head"><b>${esc(state.selectedFile)}</b><span style="color:var(--muted)">Latest commit: ${esc(latestCommit().message)}</span></div><div class="box-body">${markdown(txt)}</div></div>`}
function startEdit(){if(state.branch==='main'){toast('請先建立 Branch，避免直接修改正式版');return}state.editing=true;state.draftText=currentFiles()[state.selectedFile]||'';save()}
function editorView(){return `<div class="branch-toolbar"><div class="toolbar-left"><button class="btn small" onclick="state.editing=false;save()">← 取消編輯</button><span class="chip green">${esc(state.branch)}</span></div></div><div class="editor-wrap"><div class="editor-head"><div class="editor-tabs"><b>Edit</b><span>Preview</span></div><span>${esc(state.selectedFile)}</span></div><textarea id="file-editor" oninput="state.draftText=this.value">${esc(state.draftText)}</textarea><div class="editor-footer"><button class="btn" onclick="state.editing=false;save()">Cancel changes</button><button id="commit-button" class="btn success" onclick="openCommitModal()">${label('Commit changes…','建立版本紀錄…')}</button></div></div>`}
function markdown(text=''){return text.split('\n').map(line=>{if(line.startsWith('# '))return `<h1>${esc(line.slice(2))}</h1>`;if(line.startsWith('## '))return `<h2>${esc(line.slice(3))}</h2>`;if(line.startsWith('- '))return `<li>${esc(line.slice(2))}</li>`;if(!line.trim())return '<br>';return `<p>${esc(line)}</p>`}).join('')}
function createBranch(){if(state.issue.linkedBranch){state.branch=state.issue.linkedBranch;state.activeTab='code';save();toast('已切換到你的 Branch');return}if(!state.issue.assignee){toast('請先在 Issue 指派負責人');state.activeTab='issues';save();return}const name='alex/competitor-research';state.branches[name]={name,base:'main',createdBy:'Alex'};state.files[name]=clone(state.files.main);state.issue.linkedBranch=name;state.issue.status='in_progress';state.projectStatus='in_progress';state.branch=name;state.activeTab='code';state.selectedFile=null;state.editing=false;done('branch');logEvent('從 Issue #12 建立 Branch：'+name);save();toast('已建立安全的工作版本，不會影響 main')}
function openCommitModal(){if(!state.draftText.trim()){toast('檔案內容不可為空');return}state.modal={type:'commit',message:'',description:''};save()}
function modalView(){if(!state.modal)return'';if(state.modal.type==='commit')return commitModal();if(state.modal.type==='issue')return issueModal();if(state.modal.type==='pr')return prModal();if(state.modal.type==='review')return reviewModal();if(state.modal.type==='mistake')return mistakeModal();return''}
function commitModal(){return `<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true"><div class="modal-head"><h2>Commit changes</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body"><div class="form-row"><label>Commit message <span class="zh-label">這次完成了什麼</span></label><input id="commit-msg" class="input" value="${esc(state.modal.message||'')}" oninput="state.modal.message=this.value" placeholder="例如：新增逢甲與審計新村競品分析"></div><div class="form-row" style="margin-top:13px"><label>Extended description <span class="zh-label">補充修改原因，可不填</span></label><textarea class="textarea" oninput="state.modal.description=this.value" placeholder="說明資料來源或需要隊友特別檢查的地方">${esc(state.modal.description||'')}</textarea></div><p class="help">好的 Commit 訊息應讓未來的自己一眼看懂，不要只寫 update、fix 或改好了。</p></div><div class="modal-foot"><button class="btn" onclick="state.modal=null;save()">取消</button><button id="confirm-commit" class="btn success" onclick="commitChanges()">Commit changes</button></div></div></div>`}
function commitChanges(){const msg=(state.modal.message||'').trim();if(!msg){toast('請寫清楚這次完成了什麼');return}const files=clone(currentFiles());files[state.selectedFile]=state.draftText;state.files[state.branch]=files;state.commits.push({id:'c'+String(state.commits.length+1).padStart(3,'0'),branch:state.branch,message:msg,description:state.modal.description||'',author:state.role,at:'剛剛',files:clone(files)});state.modal=null;state.editing=false;done('commit');logEvent('建立 Commit：'+msg);save();toast('Commit 已建立，修改與原因都被記錄')}
function issuesView(){return issuesList()}
function issuesList(){const i=state.issue;if(state.selectedFile==='issue-12')return issueDetail();return `<div class="box"><div class="box-head"><div><b>Issues</b><span style="color:var(--muted);margin-left:8px">任務與問題追蹤</span></div><button class="btn success" onclick="state.modal={type:'issue'};save()">New issue</button></div><div class="issue-list-item"><div class="open-dot">◉</div><div><h3><button class="file-link" onclick="state.selectedFile='issue-12';save()">${esc(i.title)}</button> <span style="color:var(--muted);font-weight:400">#${i.id}</span></h3><p>${i.status==='done'?'Closed':'Opened'} · ${i.assignee?'assigned to '+i.assignee:'尚未指派負責人'} · ${esc(i.due)}</p></div><span class="chip purple">${esc(i.label)}</span></div></div>`}
function issueDetail(){const i=state.issue;return `<div class="page-title" style="margin-bottom:14px"><div><button class="btn small" onclick="state.selectedFile=null;save()">← Issues</button><h1 style="font-size:26px;margin-top:12px">${esc(i.title)} <span style="color:var(--muted);font-weight:400">#${i.id}</span></h1><p><span class="state-label ${i.status==='done'?'closed':''}">${i.status==='done'?'Closed':'Open'}</span> 小安 opened this issue</p></div></div><div class="issue-layout"><div><div class="discussion"><div class="avatar">安</div><div class="discussion-card"><div class="discussion-head"><b>小安</b> commented</div><div class="discussion-body"><p>${esc(i.body)}</p><h4>完成條件</h4><ul class="criteria">${i.criteria.map(c=>`<li class="${criteriaDone(c)?'done':''}">${esc(c)}</li>`).join('')}</ul></div></div></div>${i.assignee?`<div class="discussion"><div class="avatar blue">A</div><div class="discussion-card"><div class="discussion-head"><b>Alex</b> assigned this issue to themself</div><div class="discussion-body">我會在自己的 Branch 完成競品研究，再用 Pull Request 請組員確認。</div></div></div>`:''}</div><aside><div class="side-meta"><b>Assignees</b>${i.assignee?`<span class="chip">${esc(i.assignee)}</span>`:`<button id="assign-btn" class="btn small" onclick="assignIssue()">Assign yourself</button>`}</div><div class="side-meta"><b>Labels</b><span class="chip purple">${esc(i.label)}</span></div><div class="side-meta"><b>Due date</b><span>${esc(i.due)}</span></div><div class="side-meta"><b>Development</b>${i.linkedBranch?`<span class="chip green">⑂ ${esc(i.linkedBranch)}</span>`:`<button id="issue-branch-btn" class="btn small" onclick="createBranch()">Create a branch</button>`}</div></aside></div>`}
function assignIssue(){state.issue.assignee='Alex';state.issue.status='in_progress';state.projectStatus='in_progress';done('issue');logEvent('Issue #12 指派給 Alex');save();toast('現在每個人都知道這項任務由誰負責')}
function criteriaDone(c){const txt=(state.files[state.issue.linkedBranch||'main']||{})['market-research.md']||'';if(c.includes('三個'))return (txt.match(/## 競品/g)||[]).length>=3;if(c.includes('客群'))return txt.includes('宣傳')||txt.includes('做法');if(c.includes('幣別'))return !/攤位費：\s*5000/.test(txt)&&/新台幣/.test(txt);return false}
function issueModal(){return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h2>New issue</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body"><p>教學主線目前使用固定的 Issue #12，這裡提供一張「好任務」與「模糊任務」對照。</p><div class="warning"><b>模糊：</b>做一下宣傳。<br><b>可執行：</b>7 月 28 日前完成三則 Instagram 貼文，每則包含圖片、50–80 字文案及活動報名連結，由佳芸負責。</div></div><div class="modal-foot"><button class="btn primary" onclick="state.modal=null;save()">我理解了</button></div></div></div>`}
function pullsView(){return pullsCore()}
function pullsCore(){if(!state.pr)return `<div class="empty box"><h3>目前沒有 Pull Request</h3><p>在自己的 Branch 完成至少一筆 Commit 後，才能把修改送給隊友審核。</p><button id="new-pr-btn" class="btn success" onclick="openPRForm()">New pull request</button></div>`;return prDetail()}
function openPRForm(){if(!state.issue.linkedBranch||!state.done.includes('commit')){toast('請先從 Issue 建立 Branch 並完成一筆 Commit');return}state.modal={type:'pr',title:'',body:''};state.activeTab='pulls';save()}
function prModal(){return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h2>Open a pull request</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body"><div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><span class="chip">base: main</span><span>←</span><span class="chip green">compare: ${esc(state.issue.linkedBranch)}</span></div><div class="form-grid"><div class="form-row"><label>Title <span class="zh-label">讓審核者一眼理解修改</span></label><input class="input" oninput="state.modal.title=this.value" value="${esc(state.modal.title||'')}" placeholder="新增兩個校園市集競品分析"></div><div class="form-row"><label>Description <span class="zh-label">改了什麼、為什麼、要檢查什麼</span></label><textarea class="textarea" oninput="state.modal.body=this.value" placeholder="## 修改內容\n- 新增兩個競品\n\n## 請協助檢查\n- 攤位費與宣傳方法">${esc(state.modal.body||'')}</textarea></div></div></div><div class="modal-foot"><button class="btn" onclick="state.modal=null;save()">取消</button><button id="create-pr-confirm" class="btn success" onclick="createPR()">Create pull request</button></div></div></div>`}
function createPR(){if(!(state.modal.title||'').trim()||!(state.modal.body||'').trim()){toast('PR 標題與說明都需要填寫');return}state.pr={id:24,title:state.modal.title.trim(),body:state.modal.body.trim(),source:state.issue.linkedBranch,target:'main',status:'open',reviewStatus:'none',comments:[],reviewer:null};state.modal=null;state.projectStatus='in_review';done('pr');logEvent('建立 Pull Request #24：'+state.pr.title);save();toast('PR 已送出，修改尚未進入 main')}
function prDetail(){const p=state.pr;return `<div class="pr-header"><h2>${esc(p.title)} <span style="color:var(--muted);font-weight:400">#${p.id}</span></h2><p><span class="state-label ${p.status==='merged'?'merged':''}">${p.status==='merged'?'Merged':'Open'}</span> ${esc(p.source)} wants to merge into ${esc(p.target)}</p></div><div class="pr-subtabs"><button class="${state.prSubtab==='conversation'?'active':''}" onclick="state.prSubtab='conversation';save()">Conversation</button><button class="${state.prSubtab==='commits'?'active':''}" onclick="state.prSubtab='commits';save()">Commits <span class="count">${branchCommits().length}</span></button><button id="files-changed-tab" class="${state.prSubtab==='files'?'active':''}" onclick="state.prSubtab='files';save()">Files changed</button></div>${state.prSubtab==='files'?filesChangedView():state.prSubtab==='commits'?commitsView():conversationView()}`}
function branchCommits(){return state.commits.filter(c=>c.branch===state.issue.linkedBranch)}
function commitsView(){return `<div class="box"><div class="box-head"><b>${branchCommits().length} commits</b></div>${branchCommits().map(c=>`<div class="issue-list-item"><div>●</div><div><h3>${esc(c.message)}</h3><p>${esc(c.author)} committed ${esc(c.at)}</p></div><span class="chip">${esc(c.id)}</span></div>`).join('')}</div>`}
function conversationView(){const p=state.pr;return `<div class="pr-layout"><div><div class="discussion"><div class="avatar blue">A</div><div class="discussion-card"><div class="discussion-head"><b>Alex</b> opened this pull request</div><div class="discussion-body">${nl(p.body)}</div></div></div>${p.comments.map(c=>`<div class="discussion"><div class="avatar ${c.author==='志豪'?'blue':'green'}">${c.author==='志豪'?'豪':'A'}</div><div class="discussion-card"><div class="discussion-head"><b>${esc(c.author)}</b> ${esc(c.type)}</div><div class="discussion-body">${nl(c.body)}</div></div></div>`).join('')}${mergePanel()}</div><aside><div class="side-meta"><b>Reviewers</b>${p.reviewer?`<span class="chip">${esc(p.reviewer)}</span>`:'尚未指派'}</div><div class="side-meta"><b>Linked issue</b><button class="file-link" onclick="setTab('issues')">#12 ${esc(state.issue.title)}</button></div><div class="side-meta"><b>Status</b><span class="chip ${p.reviewStatus==='approved'?'green':p.reviewStatus==='changes_requested'?'orange':''}">${reviewLabel()}</span></div></aside></div>`}
function reviewLabel(){return state.pr.reviewStatus==='approved'?'Approved':state.pr.reviewStatus==='changes_requested'?'Changes requested':'Review required'}
function computeDiff(){const oldText=state.files.main['market-research.md'].split('\n');const newText=state.files[state.issue.linkedBranch]['market-research.md'].split('\n');let out=[];const max=Math.max(oldText.length,newText.length);for(let i=0;i<max;i++){const a=oldText[i],b=newText[i];if(a===b&&a!==undefined)out.push({type:'ctx',old:i+1,new:i+1,text:a});else{if(a!==undefined)out.push({type:'del',old:i+1,new:'',text:a});if(b!==undefined)out.push({type:'add',old:'',new:i+1,text:b})}}return out}
function filesChangedView(){const diff=computeDiff();return `<div class="diff-file"><div class="diff-head">market-research.md</div>${diff.map((d,i)=>`<div class="diff-line ${d.type}"><span class="num">${d.old}</span><span class="num">${d.new}</span><button class="add-btn" title="在這一行留言" onclick="openLineReview(${i})">+</button><span class="code">${d.type==='add'?'+':d.type==='del'?'-':' '} ${esc(d.text)}</span></div>`).join('')}</div>${state.pr.reviewStatus==='none'?`<div class="merge-box bad"><h3>Review required</h3><p>至少需要一位隊友確認修改。請特別檢查金額、日期與完成條件。</p><button class="btn" onclick="openGeneralReview()">Review changes</button></div>`:''}${state.pr.comments.filter(c=>c.line!==undefined).map(c=>`<div class="review-comment"><b>${esc(c.author)} 在第 ${c.line} 行：</b> ${esc(c.body)}</div>`).join('')}${state.pr.reviewStatus==='changes_requested'&&!isFixed()?`<div class="merge-box bad"><h3>Changes requested</h3><p>請先處理逐行回饋，再請隊友重新審核。</p></div>`:''}${isFixed()&&state.pr.reviewStatus==='changes_requested'?`<div class="merge-box good"><h3>新的 Commit 已處理回饋</h3><p>現在可以切換審核者並 Approve。</p><button class="btn success" onclick="approvePR()">Switch to 志豪 & Approve</button></div>`:''}`}
function startReview(){state.role='志豪';state.pr.reviewer='志豪';state.prSubtab='files';state.activeTab='pulls';save();toast('現在以隊友身分審核，不是直接修改 Alex 的內容')}
function openLineReview(index){state.role='志豪';state.pr.reviewer='志豪';const d=computeDiff()[index];state.modal={type:'review',line:d.new||d.old,lineText:d.text,kind:'line',body:d.text.includes('攤位費：5000')?'請補上幣別與單位，例如「新台幣 5,000 元」。':''};save()}
function openGeneralReview(){state.role='志豪';state.pr.reviewer='志豪';state.modal={type:'review',kind:'general',body:''};save()}
function reviewModal(){return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h2>Review changes</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body">${state.modal.kind==='line'?`<div class="warning" style="margin-bottom:13px"><b>針對這一行：</b><br>${esc(state.modal.lineText)}</div>`:''}<div class="form-row"><label>Review comment</label><textarea class="textarea" oninput="state.modal.body=this.value">${esc(state.modal.body||'')}</textarea></div><div style="margin-top:14px;display:grid;gap:8px"><label><input type="radio" name="review-kind" value="comment"> Comment：只留言，不表達是否可合併</label><label><input type="radio" name="review-kind" value="approve"> Approve：內容可正式採用</label><label><input type="radio" name="review-kind" value="changes_requested" checked> Request changes：必須修正後才能合併</label></div></div><div class="modal-foot"><button class="btn" onclick="state.modal=null;save()">取消</button><button id="submit-review" class="btn success" onclick="submitReview()">Submit review</button></div></div></div>`}
function submitReview(){const body=(state.modal.body||'').trim();if(!body){toast('請寫出具體、可執行的 Review 意見');return}const picked=document.querySelector('input[name="review-kind"]:checked');const status=picked?picked.value:'changes_requested';state.pr.comments.push({author:state.role,type:status==='approve'?'approved':status==='changes_requested'?'requested changes':'commented',body,line:state.modal.kind==='line'?state.modal.line:undefined});if(status!=='comment')state.pr.reviewStatus=status;state.modal=null;if(status==='changes_requested'){done('review');logEvent('志豪在 PR #24 Request changes：'+body)}save();toast(status==='changes_requested'?'已要求修正，PR 暫時不能合併':'Review 已送出')}
function fixFromReview(){state.role='Alex';state.branch=state.issue.linkedBranch;state.activeTab='code';state.selectedFile='market-research.md';state.editing=true;state.draftText=state.files[state.branch]['market-research.md'].replace(/攤位費：\s*5000/g,'攤位費：新台幣 5,000 元');save();toast('已定位到需要修正的內容，請確認後建立新 Commit')}
function isFixed(){const t=(state.files[state.issue.linkedBranch]||{})['market-research.md']||'';return !/攤位費：\s*5000/.test(t)&&/新台幣 5,000 元/.test(t)}
function approvePR(){if(!isFixed()){toast('尚未處理攤位費的幣別與單位');return}state.role='志豪';state.pr.reviewStatus='approved';state.pr.comments.push({author:'志豪',type:'approved',body:'已確認攤位費幣別與單位，競品數量及比較內容符合 Issue 完成條件。'});done('review');logEvent('志豪 Approve PR #24');state.prSubtab='conversation';state.activeTab='pulls';save();toast('Review 通過，現在才可以 Merge')}
function mergePanel(){const p=state.pr;if(p.status==='merged')return `<div class="merge-box good"><h3>Pull request successfully merged and closed</h3><p>main 已更新，Issue #12 與 Project 看板也同步完成。</p></div>`;if(p.reviewStatus!=='approved')return `<div class="merge-box bad"><h3>Merge blocked</h3><p>${p.reviewStatus==='changes_requested'?'尚有必須處理的 Review 意見。':'需要至少一位隊友 Approve。'}</p><button class="btn success" disabled>Merge pull request</button></div>`;return `<div class="merge-box good"><h3>All checks have passed</h3><p>修改已通過審核，可以正式放進 main。</p><button id="merge-btn" class="btn success" onclick="mergePR()">Merge pull request</button></div>`}
function mergePR(){if(!state.pr||state.pr.reviewStatus!=='approved'){toast('PR 尚未通過審核');return}state.files.main=clone(state.files[state.pr.source]);state.commits.push({id:'m'+String(state.commits.length+1).padStart(3,'0'),branch:'main',message:'Merge pull request #24 from '+state.pr.source,author:'小安',at:'剛剛',files:clone(state.files.main)});state.pr.status='merged';state.issue.status='done';state.projectStatus='done';state.branch='main';done('merge');logEvent('PR #24 Merge 至 main，Issue #12 完成');save();toast('正式版本已更新，任務與看板同步完成')}
function projectView(){const cols=[['todo','Todo','待處理'],['in_progress','In progress','進行中'],['in_review','In review','待審核'],['done','Done','完成']];return `<div class="box"><div class="box-head"><div><b>校園市集企劃</b><span style="color:var(--muted);margin-left:8px">Project board</span></div><span class="chip">1 item</span></div><div class="box-body"><div class="project-board">${cols.map(([id,en,zh])=>`<div class="project-col"><h3><span>${en}<span class="zh-label">${zh}</span></span><span>${state.projectStatus===id?1:0}</span></h3>${state.projectStatus===id?projectCard():''}</div>`).join('')}</div></div></div>`}
function projectCard(){return `<div class="project-card"><b>#12 ${esc(state.issue.title)}</b><p>${state.issue.assignee?'負責人：'+state.issue.assignee:'尚未指派'} · ${esc(state.issue.due)}</p><span class="chip purple">${esc(state.issue.label)}</span><div class="move-row" style="margin-top:9px"><button class="btn small" onclick="moveProject(-1)">←</button><button class="btn small" onclick="moveProject(1)">→</button></div></div>`}
function moveProject(dir){const arr=['todo','in_progress','in_review','done'];let i=arr.indexOf(state.projectStatus);i=Math.max(0,Math.min(arr.length-1,i+dir));state.projectStatus=arr[i];logEvent('手動更新 Project 狀態為 '+arr[i]);save()}
function graphView(){const branch=state.issue.linkedBranch;const rows=[];state.commits.forEach((c,i)=>{let track='●';if(c.branch!=='main')track='│  ●';if(c.id.startsWith('m'))track='●──╯';rows.push(`<div class="graph-row"><span class="graph-track">${track}</span><span class="graph-hash">${esc(c.id)}</span><span class="graph-msg">${esc(c.message)} ${c.branch==='main'?'<span class="graph-branch">(main)</span>':`<span class="graph-branch">(${esc(c.branch)})</span>`}</span></div>`) });return `<div class="git-graph"><div style="font-weight:800;color:#fff;margin-bottom:10px">Git 透視模式｜操作背後的版本結構</div>${rows.join('')}<div class="graph-note">Create branch 會從 main 分出安全工作線；每次 Commit 增加一個可追蹤節點；Pull Request 是提出合併申請；Merge 通過後，正式版才包含該 Branch 的內容。</div></div>`}
function inspectorPanel(){const term=termForContext();return `<aside class="side-panel inspector-panel"><div class="panel-head">現在認識</div><div class="panel-body"><div class="term-card"><b>${term.name}</b><p>${term.explain}</p></div><div class="term-card"><b>商管類比</b><p>${term.analogy}</p></div><div class="panel-head" style="margin:18px -15px 0">操作紀錄</div><div class="event-list">${state.events.length?state.events.map(e=>`<div class="event">${esc(e.text)}<time>${esc(e.at)}</time></div>`).join(''):'<div class="event">完成操作後，系統會把協作歷程記錄在這裡。</div>'}</div></div></aside>`}
function termForContext(){const map={issues:['Issue','一張可以指派、追蹤與驗收的任務或問題卡。','不是在群組說「誰幫忙做一下」，而是把工作寫成有負責人與完成條件的工作單。'],pulls:['Pull Request','把 Branch 的修改送給團隊討論、檢查與決定是否採用。','像把企劃書修訂稿附上變更說明，正式請組員審稿。'],projects:['Project','把 Issue 與 PR 放進看板，讓整體進度透明。','像 Trello 或課堂分工表，但任務會直接連到實際修改。'],graph:['Git','負責記錄檔案版本、差異與分支關係的版本控制系統。','像永遠不會忘記每一版內容與修改原因的版本帳本。'],code:state.branch==='main'?['main','團隊已採用的正式版本。','像準備交給教授或公開展示的正式企劃，不應繞過審核直接修改。']:['Branch','從正式版分出的安全工作空間。','像先在自己的修訂稿工作，確認後才申請放回正式企劃。']};const a=map[state.activeTab]||map.code;return{name:a[0],explain:a[1],analogy:a[2]}}

 {title:'建立自己的 Branch',body:'Branch 讓 Alex 修改時不影響 main 正式版。',focus:'issue-branch-btn',action:()=>{const n='alex/competitor-research';state.branches[n]={name:n,base:'main',createdBy:'Alex'};state.files[n]=clone(state.files.main);state.issue.linkedBranch=n;state.branch=n;done('branch');logEvent('示範：建立 Branch '+n);state.activeTab='code';state.selectedFile='market-research.md'}},

function startDemo(){const keepUi=state.uiMode;state=freshState();state.uiMode=keepUi;state.page='practice';state.learningMode='demo';state.demo={active:true,index:0};state.onboardingComplete=true;save()}
function nextDemo(){const steps=demoSteps();const current=steps[state.demo.index];if(current&&current.action)current.action();state.demo.index++;if(state.demo.index>=steps.length){state.demo.active=false;state.learningMode='guided';state.activeTab='graph';toast('示範完成。接下來可重新開始並自己操作。')}save()}
function closeDemo(){state.demo.active=false;save()}
function demoOverlay(){const steps=demoSteps(),i=state.demo.index,step=steps[i]||steps[steps.length-1];setTimeout(applyDemoFocus,0);return `<div class="demo-overlay"><div class="demo-top"><div><div class="demo-kicker">逐步示範 ${Math.min(i+1,steps.length)} / ${steps.length}</div><h3>${esc(step.title)}</h3><p>${esc(step.body)}</p></div><button class="close-btn" onclick="closeDemo()">×</button></div><div class="demo-actions"><button class="btn" onclick="closeDemo()">停止示範</button><button class="btn primary" onclick="nextDemo()">${i===steps.length-1?'完成示範':'執行這一步並繼續'}</button></div><div class="demo-progress"><i style="width:${((i+1)/steps.length)*100}%"></i></div></div>`}
function applyDemoFocus(){document.querySelectorAll('.demo-focus').forEach(x=>x.classList.remove('demo-focus'));if(!state.demo.active)return;const step=demoSteps()[state.demo.index];if(step&&step.focus){const el=document.getElementById(step.focus);if(el){el.classList.add('demo-focus');el.scrollIntoView({block:'center',behavior:'smooth'})}}}
function termsPage(){const terms=[['Repository / Repo','一個完整專案的共同工作區。','共同企劃資料夾，但包含版本、任務與審核紀錄。'],['main','團隊目前採用的正式版本。','準備交件或公開展示的版本。'],['Branch','從正式版分出的安全工作線。','自己的修訂稿，不會立刻改到正式企劃。'],['Commit','一次有說明、可追蹤的版本存檔。','在版本帳本蓋章，寫清楚這次完成什麼。'],['Issue','可以指派與驗收的任務或問題卡。','不是「幫忙做」，而是有負責人與完成條件的工作單。'],['Pull Request','請團隊審核並採用 Branch 修改的申請。','附上變更說明的正式審稿請求。'],['Diff','兩個版本之間實際增加、刪除或修改的內容。','老師開啟修訂模式後看到的逐行差異。'],['Review','針對修改提出意見、核准或要求修正。','逐段審稿並留下可執行回饋。'],['Merge','把通過審核的修改放進正式版本。','將核准修訂正式納入主企劃。'],['Project','用看板追蹤 Issue 與 PR 狀態。','任務進度表，但直接連到實際成果與修改。'],['Conflict','兩個版本改到同一位置，系統無法自動判斷。','兩位組員同時重寫同一段，需要共同決定保留內容。'],['Revert','用新紀錄撤銷先前修改。','不是刪除歷史，而是清楚記下「退回這次改動」。']];return `<main class="page terms-page"><div class="container"><div class="page-title"><div><h1>名詞地圖</h1><p>每個名詞都包含一句白話用途與一個商管分組類比。</p></div><div class="page-title-actions"><button class="btn primary" onclick="enterPractice('guided')">回到模擬練習</button></div></div><div class="terms-grid">${terms.map(t=>`<article class="glossary"><h3>${t[0]}</h3><p>${t[1]}</p><p class="analogy"><b>類比：</b>${t[2]}</p></article>`).join('')}</div></div></main>`}
function challengePage(){return `<main class="page challenge-page"><div class="container"><div class="challenge-hero"><div><h1>完整挑戰：校園市集最後救援</h1><p>距離截止只剩 45 分鐘。你的任務是從一張未指派的 Issue 開始，在不直接修改 main 的前提下，完成競品分析、送審、處理 Review，最後更新正式版與看板。</p><div class="warning">挑戰模式不顯示下一步提示；但所有按鈕、狀態與錯誤結果都和引導模式相同。</div><div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary large" onclick="startChallenge()">重設並開始挑戰</button><button class="btn" onclick="setPage('practice')">繼續目前進度</button></div></div><aside class="mission"><h3>成功條件</h3><ol><li>Issue 有明確負責人與完成條件</li><li>從 main 建立個人 Branch</li><li>新增至少兩個競品並 Commit</li><li>PR 說明修改內容與檢查重點</li><li>針對問題行留下具體 Review</li><li>修正後經 Approve 才 Merge</li><li>Issue 與 Project 進入完成</li></ol></aside></div><section style="margin-top:22px"><div class="page-title"><div><h1 style="font-size:26px">錯誤沙盒</h1><p>安全地看看常見捷徑會造成什麼結果；不會改動你的正式練習進度。</p></div></div><div class="mode-grid"><article class="mode-card"><h3>直接修改 main</h3><p>跳過 Branch，把未確認內容直接放進正式版。</p><button class="btn danger" onclick="showMistake('main')">模擬後果</button></article><article class="mode-card"><h3>Commit 只寫 update</h3><p>當下很快，幾天後卻無法判斷這一版做了什麼。</p><button class="btn danger" onclick="showMistake('commit')">模擬後果</button></article><article class="mode-card"><h3>沒有 Review 就 Merge</h3><p>錯誤幣別與舊日期可能直接進入公開版本。</p><button class="btn danger" onclick="showMistake('review')">模擬後果</button></article></div></section></div></main>`}
function showMistake(kind){state.modal={type:'mistake',kind};save()}
function mistakeModal(){const data={main:['直接改 main 的後果','全組立刻看到未確認內容；若 AI 一次修改多個檔案，錯誤也會直接進入正式版。正確做法是先建立 Branch。'],commit:['只寫 update 的後果','版本歷史只剩一排 update、fix、123。當網站出錯時，沒有人知道該回到哪一版。正確做法是描述這次完成的成果。'],review:['跳過 Review 的後果','「攤位費：5000」缺少幣別、活動日期仍是舊資料，卻已出現在正式網站。正確做法是先看 Diff、留下 Review，確認後才 Merge。']}[state.modal.kind];return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h2>${data[0]}</h2><button class="close-btn" onclick="state.modal=null;save()">×</button></div><div class="modal-body"><div class="warning">${data[1]}</div><p style="color:var(--muted);margin-top:14px">錯誤沙盒只呈現後果，不會改動目前的 Repository、Issue 或 PR 狀態。</p></div><div class="modal-foot"><button class="btn primary" onclick="state.modal=null;save()">回到沙盒</button></div></div></div>`}
function startChallenge(){const keep=state.uiMode;state=freshState();state.uiMode=keep==='plain'?'compare':keep;state.page='practice';state.learningMode='challenge';state.challenge=true;state.activeTab='issues';state.onboardingComplete=true;save();toast('挑戰開始：系統不會提示下一步')}
function progressPage(){const keys=['diagnose','issue','branch','commit','pr','review','merge'];const score=Math.round(keys.filter(k=>state.done.includes(k)).length/keys.length*100);const rows=[['能說明 Git 與 GitHub 的差異',state.onboardingComplete],['能將模糊分工轉成 Issue',state.done.includes('issue')],['能避免直接修改 main',state.done.includes('branch')],['Commit 訊息能說明完成內容',state.done.includes('commit')],['PR 能交代修改與審核重點',state.done.includes('pr')],['能提出具體 Review 並處理回饋',state.done.includes('review')],['通過審核後才 Merge',state.done.includes('merge')]];return `<main class="page progress-page"><div class="container"><div class="page-title"><div><h1>學習成果</h1><p>評量重點不是背出技術定義，而是能否完成一輪可追蹤、可審核的團隊協作。</p></div><div class="page-title-actions"><button class="btn" onclick="setPage('story')">回顧故事</button><button class="btn primary" onclick="setPage('challenge')">進入挑戰</button></div></div><div class="progress-grid"><section class="score-card"><div class="score-big">${score}%</div><h2>協作流程完成度</h2><p style="color:var(--muted)">已完成 ${state.done.length} 個關鍵學習事件。所有資料只保存在這台裝置的瀏覽器 localStorage。</p><div style="height:10px;background:#eaeef2;border-radius:999px;overflow:hidden"><i style="display:block;height:100%;width:${score}%;background:var(--green)"></i></div></section><section class="score-card"><h2>你的操作紀錄</h2><div class="event-list">${state.events.length?state.events.map(e=>`<div class="event">${esc(e.text)}<time>${esc(e.at)}</time></div>`).join(''):'<p style="color:var(--muted)">尚未有操作紀錄。</p>'}</div></section><section class="score-card" style="grid-column:1/-1"><h2>能力檢核</h2><table class="rubric"><thead><tr><th>能力</th><th>狀態</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]?'<span class="chip green">已展現</span>':'<span class="chip">尚未展現</span>'}</td></tr>`).join('')}</tbody></table></section></div></div></main>`}
function render(){const app=document.getElementById('app');const body=state.page==='story'?storyPage():state.page==='concept'?conceptPage():state.page==='practice'?practicePage():state.page==='terms'?termsPage():state.page==='challenge'?challengePage():progressPage();app.innerHTML=header()+body+modalView();setTimeout(applyDemoFocus,0)}
render();
</script>
</body>
</html>
